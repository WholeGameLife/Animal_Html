
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能设计器 V2.0 - 电子盆栽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../scripts/battle_system.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        
        .skill-card {
            transition: all 0.3s ease;
        }
        
        .skill-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        /* 系别颜色 */
        .element-normal { background: linear-gradient(135deg, #9ca3af, #6b7280); }
        .element-water { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .element-fire { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .element-grass { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .element-wind { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .element-metal { background: linear-gradient(135deg, #d4af37, #b8860b); }
        .element-earth { background: linear-gradient(135deg, #a16207, #854d0e); }
        
        /* 变异颜色 */
        .mutation-dark { background: linear-gradient(135deg, #1f2937, #111827); }
        .mutation-light { background: linear-gradient(135deg, #f3f4f6, #e5e7eb); color: #111827; }
        .mutation-crystal { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }
        .mutation-shadow { background: linear-gradient(135deg, #4b5563, #374151); }
        .mutation-thunder { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .mutation-holy { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
        .mutation-psychic { background: linear-gradient(135deg, #ec4899, #db2777); }
        .mutation-chaos { background: linear-gradient(135deg, #581c87, #6b21a8); }
        .mutation-eternal-dark { background: linear-gradient(135deg, #0f172a, #020617); }
        .mutation-eternal-light { background: linear-gradient(135deg, #fef9c3, #fef08a); color: #713f12; }
        .mutation-source-crystal { background: linear-gradient(135deg, #5b21b6, #6d28d9); }
        .mutation-thunder-lord { background: linear-gradient(135deg, #f59e0b, #d97706); }
        
        .emoji-picker {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .emoji-btn {
            padding: 0.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        
        .emoji-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: scale(1.2);
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <!-- 标题 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">⚔️ 技能设计器 V2.0 ⚔️</h1>
            <p class="text-blue-200 mb-3">全新技能系统 - 灵活配置效果来源和参数</p>
            <div class="flex justify-center gap-3">
                <a href='../designers/skill_viewer.html'
                   class="inline-flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                    <span>🎯</span>
                    <span>查看技能池</span>
                </a>
                <button onclick="window.history.back()"
                        class="inline-flex items-center gap-2 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                    <span>←</span>
                    <span>返回</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：技能设计表单 -->
            <div class="lg:col-span-2 bg-gray-900/80 backdrop-blur-lg rounded-xl p-6 border border-gray-700">
                <h2 class="text-2xl font-bold text-white mb-6">🎨 创建新技能</h2>
                
                <form id="skill-form" class="space-y-4">
                    <!-- 基础信息 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">技能名称 *</label>
                            <input type="text" id="skill-name" required
                                class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">技能图标 *</label>
                            <div class="flex gap-2">
                                <input type="text" id="skill-icon" required maxlength="2"
                                    class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white text-center text-2xl focus:outline-none focus:border-blue-500">
                                <button type="button" id="emoji-picker-btn"
                                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 rounded-lg">
                                    选择
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 技能描述 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">技能描述</label>
                        <textarea id="skill-description" rows="2" placeholder="描述这个技能的背景故事或特点..."
                            class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 resize-none"></textarea>
                    </div>

                    <!-- 技能类别 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">技能类别 *</label>
                            <select id="skill-category" required
                                class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                                <option value="">选择类别</option>
                                <optgroup label="系别技能">
                                    <option value="element-normal">⭕ 普通</option>
                                    <option value="element-water">💧 水系</option>
                                    <option value="element-fire">🔥 火系</option>
                                    <option value="element-grass">🌿 草系</option>
                                    <option value="element-wind">💨 风系</option>
                                    <option value="element-metal">🪙 金系</option>
                                    <option value="element-earth">🪨 土系</option>
                                </optgroup>
                                <optgroup label="变异技能 - 基础级">
                                    <option value="mutation-dark">🖤 黑化</option>
                                    <option value="mutation-light">🤍 白化</option>
                                    <option value="mutation-crystal">💎 晶化</option>
                                    <option value="mutation-shadow">👤 影化</option>
                                </optgroup>
                                <optgroup label="变异技能 - 精英级">
                                    <option value="mutation-chaos">🌑 暗蚀</option>
                                    <option value="mutation-holy">✨ 圣辉</option>
                                    <option value="mutation-psychic">🔮 异能</option>
                                    <option value="mutation-thunder">⚡ 极电</option>
                                </optgroup>
                                <optgroup label="变异技能 - 传说级">
                                    <option value="mutation-eternal-dark">🌙 永夜</option>
                                    <option value="mutation-eternal-light">☀️ 永耀</option>
                                    <option value="mutation-source-crystal">💠 源晶</option>
                                    <option value="mutation-thunder-lord">⚡ 雷煌</option>
                                </optgroup>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">技能类型 *</label>
                            <select id="skill-type" required
                                class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                                <option value="">选择类型</option>
                                <option value="attack">⚔️ 攻击型</option>
                                <option value="defense">🛡️ 防御型</option>
                                <option value="agility">⚡ 敏捷型</option>
                                <option value="buff">💪 增益型</option>
                                <option value="debuff">🔻 减益型</option>
                                <option value="heal">💚 治疗型</option>
                            </select>
                        </div>
                    </div>


                    <!-- 技能效果选择 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">技能效果 * (可多选)</label>
                        <div id="skill-effects" class="bg-gray-800 border border-gray-600 rounded-lg p-3 max-h-96 overflow-y-auto space-y-3">
                            <!-- 攻击类 -->
                            <div>
                                <div class="text-xs font-bold text-blue-400 mb-2">⚔️ 攻击类</div>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="direct_attack" class="skill-effect-checkbox">
                                        <span>直接攻击</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="multi_attack" class="skill-effect-checkbox">
                                        <span>多段攻击</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="dot_damage" class="skill-effect-checkbox">
                                        <span>附加伤害(持续)</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="percent_damage" class="skill-effect-checkbox">
                                        <span>百分比伤害</span>
                                    </label>
                                </div>
                            </div>
                            <!-- 防御类 -->
                            <div>
                                <div class="text-xs font-bold text-green-400 mb-2">🛡️ 防御类</div>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="direct_defense" class="skill-effect-checkbox">
                                        <span>直接防御</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="continuous_defense" class="skill-effect-checkbox">
                                        <span>持续防御</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="defense_counter" class="skill-effect-checkbox">
                                        <span>防御反击</span>
                                    </label>
                                </div>
                            </div>
                            <!-- 敏捷类 -->
                            <div>
                                <div class="text-xs font-bold text-yellow-400 mb-2">⚡ 敏捷类</div>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="direct_speed" class="skill-effect-checkbox">
                                        <span>直接增速</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="continuous_speed" class="skill-effect-checkbox">
                                        <span>持续增速</span>
                                    </label>
                                </div>
                            </div>
                            <!-- 增益类 -->
                            <div>
                                <div class="text-xs font-bold text-purple-400 mb-2">💪 增益类</div>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="buff_attack" class="skill-effect-checkbox">
                                        <span>增攻</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="buff_defense" class="skill-effect-checkbox">
                                        <span>增防</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="buff_speed" class="skill-effect-checkbox">
                                        <span>增速</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="buff_status_enemy" class="skill-effect-checkbox">
                                        <span>为敌方附加异常</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="buff_purify" class="skill-effect-checkbox">
                                        <span>净化</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="buff_heal_amp" class="skill-effect-checkbox">
                                        <span>增加治疗量</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="buff_element_damage" class="skill-effect-checkbox">
                                        <span>属性增伤</span>
                                    </label>
                                </div>
                            </div>
                            <!-- 减益类 -->
                            <div>
                                <div class="text-xs font-bold text-red-400 mb-2">🔻 减益类</div>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="debuff_attack" class="skill-effect-checkbox">
                                        <span>减攻</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="debuff_defense" class="skill-effect-checkbox">
                                        <span>减防</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="debuff_speed" class="skill-effect-checkbox">
                                        <span>减速</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="debuff_status_self" class="skill-effect-checkbox">
                                        <span>为自身附加异常</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="debuff_no_heal" class="skill-effect-checkbox">
                                        <span>禁疗</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="debuff_heal_reduce" class="skill-effect-checkbox">
                                        <span>减疗</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="debuff_element_damage" class="skill-effect-checkbox">
                                        <span>属性减伤</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="debuff_hp_cost" class="skill-effect-checkbox">
                                        <span>扣血</span>
                                    </label>
                                </div>
                            </div>
                            <!-- 治疗类 -->
                            <div>
                                <div class="text-xs font-bold text-pink-400 mb-2">💚 治疗类</div>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="heal_direct" class="skill-effect-checkbox">
                                        <span>直接恢复</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="heal_continuous" class="skill-effect-checkbox">
                                        <span>持续恢复</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="heal_percent" class="skill-effect-checkbox">
                                        <span>百分比恢复</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="heal_rebirth" class="skill-effect-checkbox">
                                        <span>重生</span>
                                    </label>
                                    <label class="flex items-center gap-2 text-white text-sm cursor-pointer hover:bg-gray-700 p-1.5 rounded">
                                        <input type="checkbox" name="skill-effect" value="heal_lifesteal" class="skill-effect-checkbox">
                                        <span>生命汲取</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 动态参数区域 -->
                    <div id="params-container" class="space-y-4 bg-gray-800/50 rounded-lg p-4 border border-gray-600">
                        <h3 class="text-sm font-bold text-gray-300 mb-3">📊 技能参数配置</h3>
                        
                        <!-- 通用参数 -->
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-gray-400 mb-1">冷却回合</label>
                                <input type="number" id="param-cooldown" min="0" value="0"
                                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-400 mb-1">持续回合</label>
                                <input type="number" id="param-duration" min="0" value="0"
                                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-400 mb-1">每回合次数</label>
                                <input type="number" id="param-count" min="1" value="1"
                                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500">
                            </div>
                        </div>

                        <div id="dynamic-params" class="space-y-3">
                            <!-- 动态生成的参数将插入这里 -->
                        </div>
                    </div>

                    <!-- 按钮 -->
                    <div class="flex gap-4 pt-4">
                        <button type="submit" id="submit-btn"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                            <span id="submit-text">✨ 创建技能</span>
                        </button>
                        <button type="button" id="cancel-edit-btn" class="hidden bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                            ❌ 取消编辑
                        </button>
                        <button type="button" id="clear-btn"
                            class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                            🔄 清空
                        </button>
                    </div>
                </form>
            </div>

            <!-- 右侧：技能预览和列表 -->
            <div class="space-y-6">
                <!-- 技能预览 -->
                <div class="bg-gray-900/80 backdrop-blur-lg rounded-xl p-6 border border-gray-700">
                    <h3 class="text-xl font-bold text-white mb-4">👁️ 技能预览</h3>
                    <div id="skill-preview" class="skill-card bg-gray-800 rounded-lg p-4 border-2 border-gray-600">
                        <div class="text-center text-gray-500">
                            <div class="text-4xl mb-2">❓</div>
                            <div class="text-sm">填写表单查看预览</div>
                        </div>
                    </div>
                    <a href="../pages/skill_tester.html" target="_blank"
                        class="block w-full mt-3 bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-lg transition-colors text-center">
                        🎮 打开技能测试器
                    </a>
                </div>

                <!-- 已创建技能列表 -->
                <div class="bg-gray-900/80 backdrop-blur-lg rounded-xl p-6 border border-gray-700">
                    <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-white">📋 技能列表 (<span id="skill-count">0</span>)</h3>
                    <div class="flex gap-2">
                        <button id="import-btn"
                            class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-2 px-4 rounded-lg transition-colors">
                            📤 导入
                        </button>
                        <button id="export-btn"
                            class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2 px-4 rounded-lg transition-colors">
                            📥 导出JSON
                        </button>
                        <button id="export-csv-btn"
                            class="bg-teal-600 hover:bg-teal-700 text-white text-sm font-bold py-2 px-4 rounded-lg transition-colors">
                            📊 导出CSV
                        </button>
                    </div>
                </div>
                    <div id="skills-list" class="space-y-3 max-h-96 overflow-y-auto">
                        <div class="text-center text-gray-500 text-sm py-8">
                            暂无技能
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Emoji选择器模态框 -->
        <div id="emoji-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="bg-gray-900 rounded-xl p-6 max-w-md w-full mx-4 border border-gray-700">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-white">选择图标</h3>
                    <button id="close-emoji-modal" class="text-gray-400 hover:text-white text-2xl">×</button>
                </div>
                <div id="emoji-grid" class="emoji-picker bg-gray-800 rounded-lg p-4">
                    <!-- Emoji列表 -->
                </div>
            </div>
        </div>

        <!-- 导入技能模态框 -->
        <div id="import-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="bg-gray-900 rounded-xl p-6 max-w-md w-full mx-4 border border-gray-700">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-white">📤 导入技能</h3>
                    <button id="close-import-modal" class="text-gray-400 hover:text-white text-2xl">×</button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">批次ID（可选）</label>
                        <input type="text" id="import-batch-id" placeholder="例如：草系技能2024"
                            class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                        <p class="text-xs text-gray-400 mt-1">💡 为本次导入的所有技能添加标识，方便后续筛选</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">选择文件</label>
                        <input type="file" id="import-file-input" accept=".json"
                            class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                    </div>
                    <div class="flex gap-3">
                        <button id="confirm-import-btn"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                            确认导入
                        </button>
                        <button id="cancel-import-btn"
                            class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                            取消
                        </button>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script>
        // 常用Emoji列表
        const EMOJIS = [
            '⚔️', '🗡️', '🔪', '🏹', '🔫', '💣', '🧨', '💥',
            '🛡️', '🏰', '🧱', '⛓️', '🔒', '🔐', '🗝️', '🔑',
            '⚡', '🔥', '💧', '🌊', '🌿', '🍃', '💨', '🌪️',
            '❄️', '☃️', '🧊', '💎', '💠', '🔮', '🌟', '✨',
            '💫', '⭐', '🌙', '☀️', '🌈', '☁️', '⛈️', '🌩️',
            '💪', '👊', '✊', '🤜', '🤛', '👋', '🖐️', '✋',
            '💚', '💙', '💜', '🖤', '🤍', '❤️', '🧡', '💛',
            '🩸', '💉', '💊', '🧪', '🧬', '🔬', '🧲', '⚗️',
            '🎯', '🎲', '🎰', '🎮', '🕹️', '🎪', '🎭', '🎨',
            '🌀', '🌑', '🌒', '🌓', '🌔', '🌕', '🌖', '🌗',
            '👤', '👥', '👻', '💀', '☠️', '👽', '👾', '🤖',
            '😈', '👿', '😡', '💢', '💯', '🔱', '⚜️', '♻️'
        ];

        // EFFECT_PARAMS_CONFIG已在battle_system.js中定义，这里直接使用

        // 技能池存储
        let skills = JSON.parse(localStorage.getItem('SKILL_POOL') || '[]');
        let editingIndex = -1;
        
        // 获取状态选项
        function getStatusOptions() {
            const statusPool = JSON.parse(localStorage.getItem('STATUS_POOL') || '[]');
            
            if (statusPool.length === 0) {
                return '<option value="">暂无可用状态，请先创建</option>';
            }
            
            let options = '';
            statusPool.forEach(status => {
                // 显示状态图标（如果有）
                const displayName = status.iconImage ?
                    `${status.name}` : status.name;
                options += `<option value="${status.key}">${displayName}</option>`;
            });
            
            return options;
        }

        // DOM元素
        const form = document.getElementById('skill-form');
        const preview = document.getElementById('skill-preview');
        const skillsList = document.getElementById('skills-list');
        const skillCount = document.getElementById('skill-count');
        const emojiModal = document.getElementById('emoji-modal');
        const emojiGrid = document.getElementById('emoji-grid');
        const dynamicParams = document.getElementById('dynamic-params');

        // 初始化
        function init() {
            renderSkillsList();
            setupEmojiPicker();
            setupFormListeners();
            updateSkillCount();
        }

        // 更新技能数量
        function updateSkillCount() {
            skillCount.textContent = skills.length;
        }

        // 设置Emoji选择器
        function setupEmojiPicker() {
            emojiGrid.innerHTML = '';
            EMOJIS.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'emoji-btn';
                btn.textContent = emoji;
                btn.type = 'button';
                btn.onclick = () => {
                    document.getElementById('skill-icon').value = emoji;
                    emojiModal.classList.add('hidden');
                    updatePreview();
                };
                emojiGrid.appendChild(btn);
            });

            document.getElementById('emoji-picker-btn').onclick = () => emojiModal.classList.remove('hidden');
            document.getElementById('close-emoji-modal').onclick = () => emojiModal.classList.add('hidden');
            emojiModal.onclick = (e) => {
                if (e.target === emojiModal) emojiModal.classList.add('hidden');
            };
        }

        // 设置表单监听器
        function setupFormListeners() {
            form.querySelectorAll('input, select, textarea').forEach(input => {
                input.addEventListener('input', updatePreview);
            });

            document.querySelectorAll('.skill-effect-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    showRelevantParams();
                    updatePreview();
                });
            });

            form.onsubmit = (e) => {
                e.preventDefault();
                if (editingIndex >= 0) {
                    updateSkill();
                } else {
                    createSkill();
                }
            };

            document.getElementById('clear-btn').onclick = () => {
                form.reset();
                cancelEdit();
                dynamicParams.innerHTML = '';
                updatePreview();
            };

            document.getElementById('cancel-edit-btn').onclick = () => {
                form.reset();
                cancelEdit();
                dynamicParams.innerHTML = '';
                updatePreview();
            };

            document.getElementById('export-btn').onclick = exportSkills;
            document.getElementById('export-csv-btn').onclick = exportSkillsToCSV;
            document.getElementById('import-btn').onclick = openImportModal;
        }

        // 动态显示相关参数（每个效果独立配置）
        function showRelevantParams() {
            const selectedEffects = Array.from(document.querySelectorAll('.skill-effect-checkbox:checked'))
                .map(checkbox => checkbox.value);
            
            dynamicParams.innerHTML = '';
            
            // 检查是否包含异常状态效果
            const hasStatusEffect = selectedEffects.some(effect =>
                effect === 'buff_status_enemy' || effect === 'debuff_status_self'
            );
            
            // 隐藏或显示通用参数中的持续回合和每回合次数
            const durationField = document.getElementById('param-duration').parentElement;
            const countField = document.getElementById('param-count').parentElement;
            
            if (hasStatusEffect) {
                // 如果有异常状态效果，隐藏持续回合和每回合次数
                durationField.style.display = 'none';
                countField.style.display = 'none';
            } else {
                // 否则显示
                durationField.style.display = 'block';
                countField.style.display = 'block';
            }
            
            if (selectedEffects.length === 0) return;

            const effectsHTML = selectedEffects.map(effectKey => {
                const config = EFFECT_PARAMS_CONFIG[effectKey];
                if (!config || !config.params || config.params.length === 0) return '';
                
                const paramsHTML = config.params.map(param =>
                    generateParamHTML(param, effectKey)
                ).join('');
                
                return `
                    <div class="border border-gray-600 rounded-lg p-3 bg-gray-700/30">
                        <div class="text-sm font-bold text-blue-300 mb-2">📋 ${config.name}</div>
                        <div class="grid grid-cols-1 gap-3">${paramsHTML}</div>
                    </div>
                `;
            }).filter(html => html).join('');

            if (effectsHTML) {
                dynamicParams.innerHTML = effectsHTML;
                
                // 为每个效果来源选择器添加change监听器，更新公式说明
                selectedEffects.forEach(effectKey => {
                    const sourceSelect = document.getElementById(`param-${effectKey}-effect-source`);
                    if (sourceSelect) {
                        sourceSelect.addEventListener('change', () => {
                            updateParamDescriptions(effectKey);
                            updatePreview();
                        });
                    }
                    
                    // 为特殊的第二效果来源也添加监听器（如防御反击的反击效果来源）
                    const counterSourceSelect = document.getElementById(`param-${effectKey}-counter-effect-source`);
                    if (counterSourceSelect) {
                        counterSourceSelect.addEventListener('change', () => {
                            updateCounterParamDescriptions(effectKey);
                            updatePreview();
                        });
                    }
                });
            }
        }

        // 更新参数说明文本
        function updateParamDescriptions(effectKey) {
            const sourceSelect = document.getElementById(`param-${effectKey}-effect-source`);
            if (!sourceSelect) return;
            
            const sourceName = getEffectSourceName(sourceSelect.value);
            const config = EFFECT_PARAMS_CONFIG[effectKey];
            
            // 更新该效果下所有参数的说明文本
            config.params.forEach(param => {
                const descId = `desc-${effectKey}-${param}`;
                const descEl = document.getElementById(descId);
                if (descEl && sourceName) {
                    switch(param) {
                        case 'bonus':
                            descEl.textContent = `效果 = ${sourceName} × 加成值`;
                            break;
                        case 'multi-bonus':
                            descEl.textContent = `每段伤害 = ${sourceName} × 对应加成`;
                            break;
                        case 'percent':
                            descEl.textContent = `效果 = ${sourceName} × 百分比`;
                            break;
                        case 'defense-bonus':
                            descEl.textContent = `防御值 = 当前防御 + ${sourceName} × 防御加成`;
                            break;
                    }
                }
            });
        }

        // 更新反击参数说明文本
        function updateCounterParamDescriptions(effectKey) {
            const counterSourceSelect = document.getElementById(`param-${effectKey}-counter-effect-source`);
            if (!counterSourceSelect) return;
            
            const counterSourceName = getEffectSourceName(counterSourceSelect.value);
            const descEl = document.getElementById(`desc-${effectKey}-counter-bonus`);
            
            if (descEl && counterSourceName) {
                descEl.textContent = `反击伤害 = ${counterSourceName} × 反击加成`;
            }
        }

        // 生成参数HTML（每个效果独立配置效果来源）
        function generateParamHTML(paramType, effectName) {
            const paramId = `param-${effectName}-${paramType}`;
            
            switch(paramType) {
                case 'effect-source':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">⚡ 效果来源</label>
                        <select id="${paramId}" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                            <optgroup label="自身属性">
                                <option value="self-current-attack">自身当前攻击力</option>
                                <option value="self-base-attack">自身基础攻击力</option>
                                <option value="self-current-defense">自身当前防御力</option>
                                <option value="self-base-defense">自身基础防御力</option>
                                <option value="self-current-agility">自身当前敏捷</option>
                                <option value="self-base-agility">自身基础敏捷</option>
                                <option value="self-max-hp">自身最大生命</option>
                                <option value="self-lost-hp">自身已损失生命</option>
                                <option value="self-current-hp">自身剩余生命</option>
                                <option value="self-turn-damage">自身回合造成的伤害</option>
                            </optgroup>
                            <optgroup label="敌方属性">
                                <option value="enemy-current-attack">敌方当前攻击力</option>
                                <option value="enemy-base-attack">敌方基础攻击力</option>
                                <option value="enemy-current-defense">敌方当前防御力</option>
                                <option value="enemy-base-defense">敌方基础防御力</option>
                                <option value="enemy-current-agility">敌方当前敏捷</option>
                                <option value="enemy-base-agility">敌方基础敏捷</option>
                                <option value="enemy-max-hp">敌方最大生命</option>
                                <option value="enemy-lost-hp">敌方已损失生命</option>
                                <option value="enemy-current-hp">敌方剩余生命</option>
                                <option value="enemy-turn-damage">敌方回合造成的伤害</option>
                            </optgroup>
                        </select></div>`;
                
                case 'bonus':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">加成值</label>
                        <input type="number" id="${paramId}" step="0.01" min="0" value="1.0"
                            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                        <p id="desc-${effectName}-bonus" class="text-xs text-gray-500 mt-1">效果 = 效果来源 × 加成值</p></div>`;
                
                case 'multi-bonus':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">多段加成(逗号分隔)</label>
                        <input type="text" id="${paramId}" placeholder="例: 0.5,0.7,1.0"
                            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                        <p id="desc-${effectName}-multi-bonus" class="text-xs text-gray-500 mt-1">每段伤害 = 效果来源 × 对应加成</p></div>`;
                
                case 'percent':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">百分比 (0-1)</label>
                        <input type="number" id="${paramId}" step="0.01" min="0" max="1" value="0.1"
                            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                        <p id="desc-${effectName}-percent" class="text-xs text-gray-500 mt-1">效果 = 效果来源 × 百分比</p></div>`;
                
                case 'defense-bonus':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">防御加成</label>
                        <input type="number" id="${paramId}" step="0.01" min="0" value="1.0"
                            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                        <p id="desc-${effectName}-defense-bonus" class="text-xs text-gray-500 mt-1">防御值 = 当前防御 + 效果来源 × 防御加成</p></div>`;
                
                case 'counter-effect-source':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">⚡ 反击效果来源</label>
                        <select id="${paramId}" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                            <optgroup label="自身属性">
                                <option value="self-current-attack">自身当前攻击力</option>
                                <option value="self-base-attack">自身基础攻击力</option>
                                <option value="self-current-defense">自身当前防御力</option>
                                <option value="self-base-defense">自身基础防御力</option>
                                <option value="self-current-agility">自身当前敏捷</option>
                                <option value="self-base-agility">自身基础敏捷</option>
                                <option value="self-max-hp">自身最大生命</option>
                                <option value="self-lost-hp">自身已损失生命</option>
                                <option value="self-current-hp">自身剩余生命</option>
                                <option value="self-turn-damage">自身回合造成的伤害</option>
                            </optgroup>
                            <optgroup label="敌方属性">
                                <option value="enemy-current-attack">敌方当前攻击力</option>
                                <option value="enemy-base-attack">敌方基础攻击力</option>
                                <option value="enemy-current-defense">敌方当前防御力</option>
                                <option value="enemy-base-defense">敌方基础防御力</option>
                                <option value="enemy-current-agility">敌方当前敏捷</option>
                                <option value="enemy-base-agility">敌方基础敏捷</option>
                                <option value="enemy-max-hp">敌方最大生命</option>
                                <option value="enemy-lost-hp">敌方已损失生命</option>
                                <option value="enemy-current-hp">敌方剩余生命</option>
                                <option value="enemy-turn-damage">敌方回合造成的伤害</option>
                            </optgroup>
                        </select>
                        <p class="text-xs text-gray-500 mt-1">用于计算反击伤害</p></div>`;
                
                case 'counter-bonus':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">反击伤害加成</label>
                        <input type="number" id="${paramId}" step="0.01" min="0" value="0.5"
                            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                        <p id="desc-${effectName}-counter-bonus" class="text-xs text-gray-500 mt-1">反击伤害 = 反击效果来源 × 反击加成</p></div>`;
                
                case 'damage-bonus':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">伤害加成 (0-1)</label>
                        <input type="number" id="${paramId}" step="0.01" min="0" max="1" value="0.2"
                            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                        <p class="text-xs text-gray-500 mt-1">最终伤害 = 原始伤害 × (1 + 加成)</p></div>`;
                
                case 'damage-reduce':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">伤害减免 (0-1)</label>
                        <input type="number" id="${paramId}" step="0.01" min="0" max="1" value="0.2"
                            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                        <p class="text-xs text-gray-500 mt-1">最终伤害 = 原始伤害 × (1 - 减免)</p></div>`;
                
                case 'target':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">目标</label>
                        <select id="${paramId}" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                            <option value="self">自身</option>
                            <option value="ally-all">我方全体</option>
                            <option value="enemy-single">敌方单体</option>
                            <option value="enemy-all">敌方全体</option>
                        </select></div>`;
                
                case 'status-type':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">异常状态类型</label>
                        <select id="${paramId}" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                            ${getStatusOptions()}
                        </select>
                        <p class="text-xs text-gray-500 mt-1">来自状态池 | <a href='../designers/status_designer.html' class="text-blue-400 hover:text-blue-300" target="_blank">创建新状态</a></p>
                    </div>`;
                
                case 'status-chance':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">施加概率 (%)</label>
                        <input type="number" id="${paramId}" min="0" max="100" value="100"
                            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                        <p class="text-xs text-gray-500 mt-1">成功施加状态的概率</p></div>`;
                
                case 'status-stacks':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">施加层数</label>
                        <input type="number" id="${paramId}" min="1" max="99" value="1"
                            class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                        <p class="text-xs text-gray-500 mt-1">一次施加的状态层数</p></div>`;
                
                case 'purify-type':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">驱散目标类型</label>
                        <select id="${paramId}" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                            <option value="all">全部状态</option>
                            <option value="negative">🔻 负面状态</option>
                            <option value="positive">💚 正面状态</option>
                            <option value="neutral">⚪ 中性状态</option>
                            <optgroup label="指定状态">
                                ${getStatusOptions()}
                            </optgroup>
                        </select>
                        <p class="text-xs text-gray-500 mt-1">选择要驱散的状态类型 | <a href='../designers/status_designer.html' class="text-blue-400 hover:text-blue-300" target="_blank">管理状态</a></p>
                    </div>`;
                
                case 'purify-count':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">驱散数量</label>
                        <select id="${paramId}" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                            <option value="1">驱散 1 个</option>
                            <option value="2">驱散 2 个</option>
                            <option value="3">驱散 3 个</option>
                            <option value="all" selected>驱散全部</option>
                        </select>
                        <p class="text-xs text-gray-500 mt-1">按施加时间从旧到新驱散</p>
                    </div>`;
                
                case 'element-type':
                    return `<div><label class="block text-xs font-medium text-gray-400 mb-1">属性类型</label>
                        <select id="${paramId}" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                            <option value="normal">普通</option>
                            <option value="water">水</option>
                            <option value="fire">火</option>
                            <option value="grass">草</option>
                            <option value="wind">风</option>
                            <option value="metal">金</option>
                            <option value="earth">土</option>
                        </select></div>`;
                
                case 'rebirth-condition':

        // 获取表单数据
        function getFormData() {
            const selectedEffects = Array.from(document.querySelectorAll('.skill-effect-checkbox:checked'))
                .map(checkbox => checkbox.value);
            
            const params = {
                cooldown: parseInt(document.getElementById('param-cooldown').value) || 0,
                duration: parseInt(document.getElementById('param-duration').value) || 0,
                count: parseInt(document.getElementById('param-count').value) || 1
            };

            selectedEffects.forEach(effectKey => {
                const config = EFFECT_PARAMS_CONFIG[effectKey];
                if (config && config.params) {
                    config.params.forEach(param => {
                        const el = document.getElementById(`param-${effectKey}-${param}`);
                        if (el) {
                            if (param === 'multi-bonus') {
                                params[`${effectKey}_${param}`] = el.value.split(',').map(v => parseFloat(v.trim()) || 1.0);
                            } else if (el.type === 'number') {
                                params[`${effectKey}_${param}`] = parseFloat(el.value) || 0;
                            } else {
                                params[`${effectKey}_${param}`] = el.value;
                            }
                        }
                    });
                }
            });

            return {
                name: document.getElementById('skill-name').value,
                icon: document.getElementById('skill-icon').value,
                description: document.getElementById('skill-description').value,
                category: document.getElementById('skill-category').value,
                type: document.getElementById('skill-type').value,
                effects: selectedEffects,
                params: params
            };
        }

        function createSkill() {
            const data = getFormData();

            const skill = {
                key: skillKey,
                ...data,
                createdAt: new Date().toISOString()
            };

            skills.push(skill);
            saveSkillPool();
            
            renderSkillsList();
            updateSkillCount();
            form.reset();
            dynamicParams.innerHTML = '';
            updatePreview();
            
            alert(`✅ 技能 "${data.name}" 已创建！`);
        }

        // 更新技能
        function updateSkill() {

                ...data,
                createdAt: skills[editingIndex].createdAt,
                updatedAt: new Date().toISOString()
            };

            renderSkillsList();

        // 编辑技能
        function editSkill(index) {
            const skill = skills[index];
            editingIndex = index;
            
            // 填充基础信息
            document.getElementById('skill-name').value = skill.name;
            document.getElementById('skill-icon').value = skill.icon;
            document.getElementById('skill-description').value = skill.description || '';
            document.getElementById('skill-category').value = skill.category;
            document.getElementById('skill-type').value = skill.type;
            
            // 填充效果复选框
            document.querySelectorAll('.skill-effect-checkbox').forEach(cb => {
                cb.checked = skill.effects.includes(cb.value);
            });
            
            // 显示相关参数
            showRelevantParams();
            
            // 填充通用参数
            document.getElementById('param-cooldown').value = skill.params.cooldown || 0;
            document.getElementById('param-duration').value = skill.params.duration || 0;
            document.getElementById('param-count').value = skill.params.count || 1;
            
            // 填充效果参数
            skill.effects.forEach(effectKey => {
                const config = EFFECT_PARAMS_CONFIG[effectKey];
                if (config && config.params) {
                    config.params.forEach(param => {
                        const paramKey = `${effectKey}_${param}`;
                        const el = document.getElementById(`param-${effectKey}-${param}`);
                        if (el && skill.params[paramKey] !== undefined) {
                            if (param === 'multi-bonus') {

                            } else {

                            }
                        }
                    });
                }
            });
            
            // 更新参数说明
            skill.effects.forEach(effectKey => {

        // 导出技能池（CSV格式 - 策划友好版）
        function exportSkillsToCSV() {
            if (skills.length === 0) {
                alert('技能池为空！');
                return;
            }

            // 转义 CSV 字段
            const escapeCSV = (value) => {
                if (value === null || value === undefined) return '';
                const str = String(value);
                if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                    return `"${str.replace(/"/g, '""')}"`;
                }
                return str;
            };

            // 定义所有可能的效果参数列（策划配置用）
            const allEffectParams = {
                // 攻击类
                'direct_attack': ['effect-source', 'bonus'],
                'multi_attack': ['effect-source', 'multi-bonus'],
                'dot_damage': ['effect-source', 'bonus'],
                'percent_damage': ['effect-source', 'percent'],
                // 防御类
                'direct_defense': ['effect-source', 'bonus'],
                'continuous_defense': ['effect-source', 'bonus'],
                'defense_counter': ['effect-source', 'defense-bonus', 'counter-effect-source', 'counter-bonus'],
                // 敏捷类
                'direct_speed': ['effect-source', 'bonus'],
                'continuous_speed': ['effect-source', 'bonus'],
                // 增益类
                'buff_attack': ['effect-source', 'bonus', 'target'],
                'buff_defense': ['effect-source', 'bonus', 'target'],
                'buff_speed': ['effect-source', 'bonus', 'target'],
                'buff_status_enemy': ['status-type', 'status-chance', 'status-stacks'],
                'buff_purify': ['target', 'purify-type', 'purify-count'],
                'buff_heal_amp': ['effect-source', 'bonus', 'target'],
                'buff_element_damage': ['target', 'element-type', 'damage-bonus'],
                // 减益类
                'debuff_attack': ['effect-source', 'bonus', 'target'],
                'debuff_defense': ['effect-source', 'bonus', 'target'],
                'debuff_speed': ['effect-source', 'bonus', 'target'],
                'debuff_status_self': ['status-type', 'status-chance', 'status-stacks'],
                'debuff_no_heal': ['target'],
                'debuff_heal_reduce': ['target', 'bonus'],
                'debuff_element_damage': ['target', 'element-type', 'damage-reduce'],
                'debuff_hp_cost': ['effect-source', 'bonus', 'target'],
                // 治疗类
                'heal_direct': ['effect-source', 'bonus', 'target'],
                'heal_continuous': ['effect-source', 'bonus', 'target'],
                'heal_percent': ['effect-source', 'percent', 'target'],
                'heal_rebirth': ['effect-source', 'percent', 'rebirth-condition'],
                'heal_lifesteal': ['effect-source', 'bonus']
            };

            // 基础表头（策划易读）
            const baseHeaders = [
                '技能ID', '技能名称', '图标', '技能描述',
                '技能类别', '技能类型', '技能效果列表',
                '冷却回合', '持续回合', '每回合次数'
            ];

            // 构建效果参数表头
            const effectHeaders = [];
            const effectKeys = Object.keys(allEffectParams);
            effectKeys.forEach(effectKey => {
                const effectName = EFFECT_PARAMS_CONFIG[effectKey]?.name || effectKey;
                allEffectParams[effectKey].forEach(param => {
                    const paramName = getParamDisplayName(param);
                    effectHeaders.push(`${effectName}_${paramName}`);
                });
            });

            const headers = [...baseHeaders, ...effectHeaders, '创建时间', '更新时间', '备注'];

            // 构建CSV内容
            let csvContent = headers.join(',') + '\n';

            skills.forEach(skill => {
                const params = skill.params || {};
                
                // 基础信息
                const baseRow = [
                    escapeCSV(skill.key),
                    escapeCSV(skill.name),
                    escapeCSV(skill.icon),
                    escapeCSV(skill.description || ''),
                    escapeCSV(getCategoryName(skill.category)),
                    escapeCSV(getTypeName(skill.type)),
                    escapeCSV((skill.effects || []).map(e => EFFECT_PARAMS_CONFIG[e]?.name || e).join('; ')),
                    escapeCSV(params.cooldown || 0),
                    escapeCSV(params.duration || 0),
                    escapeCSV(params.count || 1)
                ];

                // 效果参数
                const effectRow = [];
                effectKeys.forEach(effectKey => {
                    allEffectParams[effectKey].forEach(param => {
                        const paramKey = `${effectKey}_${param}`;
                        let value = params[paramKey];
                        
                        // 特殊处理不同类型的参数
                        if (value !== undefined && value !== null) {
                            if (Array.isArray(value)) {
                                value = value.join(';');
                            } else if (param === 'effect-source' || param === 'counter-effect-source') {
                                value = getEffectSourceName(value);
                            } else if (param === 'target') {
                                value = getTargetName(value);
                            } else if (param === 'status-type') {
                                const statusPool = JSON.parse(localStorage.getItem('STATUS_POOL') || '[]');
                                const status = statusPool.find(s => s.key === value);
                                value = status ? status.name : value;
                            } else if (param === 'purify-type') {
                                value = getPurifyTypeName(value);
                            } else if (param === 'element-type') {
                                value = getElementName(value);
                            } else if (param === 'rebirth-condition') {
                                value = value === 'death' ? '死亡后触发' : '低生命触发';
                            }
                        } else {
                            value = '';
                        }
                        
                        effectRow.push(escapeCSV(value));
                    });
                });

                const row = [...baseRow, ...effectRow,
                    escapeCSV(skill.createdAt ? new Date(skill.createdAt).toLocaleString('zh-CN') : ''),
                    escapeCSV(skill.updatedAt ? new Date(skill.updatedAt).toLocaleString('zh-CN') : ''),
                    ''  // 备注列留空
                ];
                
                csvContent += row.join(',') + '\n';
            });

            // 添加 BOM 以支持 Excel 正确显示中文
            const BOM = '\uFEFF';
            const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `技能配置表_${Date.now()}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            
            alert(`✅ 已导出 ${skills.length} 个技能到策划配置表（CSV格式）！\n\n表格特点：\n• 扁平化结构，便于Excel编辑\n• 中文列名，易于理解\n• 所有参数独立成列\n• 只显示已配置的参数值`);
        }

        // 辅助函数：获取净化类型名称
        function getPurifyTypeName(type) {

                'negative': '负面状态',
                'positive': '正面状态',
                'neutral': '中性状态'
            };

        // 打开导入模态框
        function openImportModal() {
            document.getElementById('import-modal').classList.remove('hidden');
            document.getElementById('import-batch-id').value = '';
            document.getElementById('import-file-input').value = '';
        }

        // 导入技能
        function importSkills() {
            const fileInput = document.getElementById('import-file-input');
            const batchId = document.getElementById('import-batch-id').value.trim();
            const file = fileInput.files[0];
            
            if (!file) {
                alert('❌ 请选择要导入的文件！');
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedSkills = JSON.parse(event.target.result);
                    
                    if (!Array.isArray(importedSkills)) {
                        alert('❌ 无效的JSON格式！');
                        return;
                    }

                    // 为所有导入的技能添加批次ID
                    const processedSkills = importedSkills.map(skill => {
                        const newSkill = {...skill};
                        if (batchId) {
                            newSkill.batchId = batchId;
                        }
                        return newSkill;
                    });

                    const existingKeys = new Set(skills.map(s => s.key));
                    const newSkills = processedSkills.filter(s => !existingKeys.has(s.key));
                    
                    skills = [...skills, ...newSkills];
                    saveSkillPool();
                    
                    renderSkillsList();
                    updateSkillCount();
                    closeImportModal();
                    
                    if (batchId) {
                        alert(`✅ 成功导入 ${newSkills.length} 个新技能！\n批次ID: ${batchId}`);
                    } else {
                        alert(`✅ 成功导入 ${newSkills.length} 个新技能！`);
                    }
                } catch (error) {
                    alert('❌ 导入失败：' + error.message);
                }
            };
            reader.readAsText(file);
        }

        // 获取状态显示信息
        function getStatusDisplay(statusKey) {

        function enemyAttack() {
            addLog(`━━━━━ 敌人回合 ━━━━━`, 'red');
            
            // 检查敌人是否能够行动
            if (battleState.enemy.cannotAct) {
                addLog(`❌ 敌人无法行动！`, 'purple');
                return;
            }
            
            // 检查敌人是否能够攻击
            if (battleState.enemy.cannotAttack) {
                addLog(`❌ 敌人无法攻击！`, 'purple');
                return;
            }
            
            // 计算敌人的攻击伤害
            const rawDamage = battleState.enemy.attack;
            
            // 检查我方是否能够防御
            const defense = battleState.self.cannotDefend ? 0 : battleState.self.defense;
            if (battleState.self.cannotDefend) {
                addLog(`⚠️ 我方无法防御！`, 'yellow');
            }
            
            const actualDamage = Math.max(1, rawDamage - defense);
            
            // 减少我方生命值
            battleState.self.hp -= actualDamage;
            // 记录敌方本回合造成的伤害（用于某些技能效果计算）
            battleState.enemy.turnDamage += actualDamage;
            
            addLog(`敌人攻击: ${rawDamage} - ${defense}(我方防御) = ${actualDamage} 点伤害`, 'red');
            addLog(`我方生命值: ${Math.round(battleState.self.hp)}/${battleState.self.maxHp}`, 'red');
            
            updateBattleUI();
            
            if (battleState.self.hp <= 0) {
                addLog('💀 我方被击败！', 'red');
            }
        }

        function nextTurn() {
            currentTurn++;
            battleState.self.turnDamage = 0;
            battleState.enemy.turnDamage = 0;
            
            addLog(`━━━━━ 第${currentTurn}回合开始 ━━━━━`, 'blue');
            
            // 重置属性到基础值（清除上回合的状态加成）
            resetAttributesToBase(battleState);
            
            // 回合开始：先递减状态持续时间（使用全局函数）
            decreaseStatusDurations('self', battleState, addLog);
            decreaseStatusDurations('enemy', battleState, addLog);
            
            // 处理本回合的状态效果（使用全局函数）
            processStatuses('self', battleState, addLog, localApplyStatusEffect);
            processStatuses('enemy', battleState, addLog, localApplyStatusEffect);
            
            // 清除临时增益效果（duration=0的效果）
            clearTemporaryBuffs();
            
            // 处理持续效果
            if (activeEffects.length > 0) {
                addLog(`触发 ${activeEffects.length} 个持续效果`, 'yellow');
                
                activeEffects.forEach(effect => {
                    addLog(`[${EFFECT_PARAMS_CONFIG[effect.effectKey]?.name}] 剩余${effect.remainingTurns}回合`, 'yellow');
                    
                    if (effect.isTempBuff) {
                        // 临时增益效果（属性增伤/减伤）只在回合结束时清除，不需要每回合触发
                        addLog(`→ 临时增益效果保持中`, 'cyan');
                    } else {
                        testSkill = effect.skill; // 临时设置技能以便applyEffect使用
                        
                        // 对于基础属性，使用锁定的初始值；对于当前属性，重新计算
                        let effectValue;
                        if (effect.effectSource && effect.effectSource.includes('base')) {
                            effectValue = effect.lockedSourceValue;
                            addLog(`→ 使用锁定的基础值: ${Math.round(effectValue)}`, 'cyan');
                        } else {
                            effectValue = getEffectSourceValue(effect.effectSource);
                            addLog(`→ 重新计算当前值: ${Math.round(effectValue)}`, 'yellow');
                        }
                        
                        applyEffect(effect.effectKey, effectValue, effect.count);
                    }
                });
                
                // 减少回合数并移除已结束的效果
                const beforeCount = activeEffects.length;
                activeEffects = activeEffects.map(effect => ({
                    ...effect,
                    remainingTurns: effect.remainingTurns - 1
                })).filter(effect => {
                    if (effect.remainingTurns > 0) {
                        return true;
                    } else {
                        // 清除过期的临时增益效果
                        if (effect.isTempBuff) {
                            testSkill = effect.skill;
                            const params = testSkill.params;
                            if (effect.effectKey === 'buff_element_damage') {
                                const elementType = params[`${effect.effectKey}_element-type`] || 'fire';
                                if (battleState.self.elementDamageBonus) {
                                    delete battleState.self.elementDamageBonus[elementType];
                                }
                                addLog(`× 属性增伤效果已结束(${getElementName(elementType)}系)`, 'gray');
                            } else if (effect.effectKey === 'debuff_element_damage') {
                                const elementType = params[`${effectKey}_element-type`] || 'fire';
                                if (battleState.enemy.elementDamageReduce) {
                                    delete battleState.enemy.elementDamageReduce[elementType];
                                }
                                addLog(`× 属性减伤效果已结束(${getElementName(elementType)}系)`, 'gray');
                            }
                        }
                        return false;
                    }
                });
                
                if (beforeCount !== activeEffects.length) {
                    addLog(`${beforeCount - activeEffects.length} 个效果已结束`, 'gray');
                }
                addLog(`持续效果处理完成，剩余 ${activeEffects.length} 个`, 'gray');
            } else {
                addLog('无持续效果', 'gray');
            }
            
            updateBattleUI();
            updateTurnDisplay();
            updateAdvantageIndicator();
            
            if (battleState.enemy.hp <= 0) {
                addLog('💀 敌人被击败！', 'red');
            }
            
            addLog(`━━━━━ 第${currentTurn}回合结束 ━━━━━`, 'blue');
        }
