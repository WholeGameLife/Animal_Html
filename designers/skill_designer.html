            }

            // 更新回合信息
            updateTurnDisplay();
            
            // 更新克制关系（系别可能被状态改变）
            updateAdvantageIndicator();
        }

        function addLog(message, color = 'white') {
            const log = document.getElementById('battle-log');
            if (log.querySelector('.text-gray-500')) {
                log.innerHTML = '';
            }
            const entry = document.createElement('div');
            entry.className = `text-${color}-400`;
            entry.textContent = `▸ ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function getEffectSourceValue(sourceKey) {
            const mapping = {
                'self-current-attack': battleState.self.attack,
                'self-base-attack': battleState.self.baseAttack,
                'self-current-defense': battleState.self.defense,
                'self-base-defense': battleState.self.baseDefense,
                'self-current-agility': battleState.self.agility,
                'self-base-agility': battleState.self.baseAgility,
                'self-max-hp': battleState.self.maxHp,
                'self-lost-hp': battleState.self.maxHp - battleState.self.hp,
                'self-current-hp': battleState.self.hp,
                'self-turn-damage': battleState.self.turnDamage,
                'enemy-current-attack': battleState.enemy.attack,
                'enemy-base-attack': battleState.enemy.baseAttack,
                'enemy-current-defense': battleState.enemy.defense,
                'enemy-base-defense': battleState.enemy.baseDefense,
                'enemy-current-agility': battleState.enemy.agility,
                'enemy-base-agility': battleState.enemy.baseAgility,
                'enemy-max-hp': battleState.enemy.maxHp,
                'enemy-lost-hp': battleState.enemy.maxHp - battleState.enemy.hp,
                'enemy-current-hp': battleState.enemy.hp,
                'enemy-turn-damage': battleState.enemy.turnDamage
            };
            return mapping[sourceKey] || 0;
        }

        function useSkill() {
            useSkillInternal();
            updateBattleUI();
            if (battleState.enemy.hp <= 0) {
                addLog('💀 敌人被击败！', 'red');
            }
            addLog(`━━━━━ 回合结束 ━━━━━`, 'blue');
        }

        function useSkillInternal() {
            // 检查是否能够行动
            if (battleState.self.cannotAct) {
                addLog(`❌ 我方无法行动！`, 'purple');
                return;
            }
            
            // 检查是否能够攻击（仅对攻击型技能）
            const isAttackSkill = testSkill.effects.some(e =>
                e.includes('attack') || e.includes('damage')
            );
            if (isAttackSkill && battleState.self.cannotAttack) {
                addLog(`❌ 我方无法攻击！`, 'purple');
                return;
            }
            
            const count = testSkill.params.count || 1;
            addLog(`使用技能【${testSkill.name}】`, 'blue');
            if (count > 1) {
                addLog(`每回合次数: ${count}`, 'yellow');
            }

            // 按回合执行顺序排序效果
            const effectPriority = {
                // 第一阶段：净化（回合开始最先生效）
                'buff_purify': 1,
                
                // 第二阶段：辅助状态效果（异常状态、禁疗、减疗等，在治疗前生效）
                'buff_status_enemy': 2, 'debuff_status_self': 2,
                'debuff_no_heal': 2, 'debuff_heal_reduce': 2,
                'buff_heal_amp': 2, 'buff_element_damage': 2, 'debuff_element_damage': 2,
                'debuff_hp_cost': 2,
                
                // 第三阶段：治疗类（回合开始时如果不满血则生效）
                'heal_direct': 3, 'heal_continuous': 3, 'heal_percent': 3, 'heal_rebirth': 3,
                
                // 第四阶段：属性增益/减益
                'buff_attack': 4, 'buff_defense': 4, 'buff_speed': 4,
                'debuff_attack': 4, 'debuff_defense': 4, 'debuff_speed': 4,
                'direct_speed': 4, 'continuous_speed': 4,
                
                // 第五阶段：防御类
                'direct_defense': 5, 'continuous_defense': 5, 'defense_counter': 5,
                
                // 第六阶段：伤害类
                'direct_attack': 6, 'multi_attack': 6, 'dot_damage': 6, 'percent_damage': 6,
                
                // 第七阶段：生命汲取（基于造成的伤害）
                'heal_lifesteal': 7
            };

            // 对效果按优先级排序
            const sortedEffects = [...testSkill.effects].sort((a, b) => {
                return (effectPriority[a] || 99) - (effectPriority[b] || 99);
            });

            addLog(`━ 执行顺序: ${sortedEffects.map(e => EFFECT_PARAMS_CONFIG[e]?.name || e).join(' → ')}`, 'gray');

            const duration = testSkill.params.duration || 0;

            sortedEffects.forEach(effectKey => {
                // 某些效果不需要效果来源
                const noSourceEffects = ['buff_status_enemy', 'debuff_status_self', 'buff_purify', 'debuff_no_heal'];
                const tempBuffEffects = ['buff_element_damage', 'debuff_element_damage']; // 临时增益效果
                
                let sourceValue = 0;
                if (!noSourceEffects.includes(effectKey) && !tempBuffEffects.includes(effectKey)) {
                    const effectSource = testSkill.params[`${effectKey}_effect-source`];
                    sourceValue = getEffectSourceValue(effectSource);
                    addLog(`[${EFFECT_PARAMS_CONFIG[effectKey]?.name}] 效果来源: ${getEffectSourceName(effectSource)} = ${Math.round(sourceValue)}`, 'yellow');
                } else {
                    addLog(`[${EFFECT_PARAMS_CONFIG[effectKey]?.name}]`, 'yellow');
                }
                
                // 立即执行一次效果
                applyEffect(effectKey, sourceValue, count);
                
                // 如果有持续回合，添加到持续效果列表
                if (duration > 0) {
                    if (!noSourceEffects.includes(effectKey) && !tempBuffEffects.includes(effectKey)) {
                        // 有效果来源的持续效果
                        const effectSource = testSkill.params[`${effectKey}_effect-source`];
                        activeEffects.push({
                            effectKey: effectKey,
                            effectSource: effectSource,
                            lockedSourceValue: sourceValue,
                            count: count,
                            skill: testSkill,
                            remainingTurns: duration
                        });
                        addLog(`→ ${EFFECT_PARAMS_CONFIG[effectKey]?.name} 将持续 ${duration} 回合（锁定来源值：${Math.round(sourceValue)}）`, 'cyan');
                    } else if (tempBuffEffects.includes(effectKey)) {
                        // 临时增益效果（属性增伤/减伤）
                        activeEffects.push({
                            effectKey: effectKey,
                            effectSource: null,
                            lockedSourceValue: 0,
                            count: 0,
                            skill: testSkill,
                            remainingTurns: duration,
                            isTempBuff: true // 标记为临时增益
                        });
                        addLog(`→ ${EFFECT_PARAMS_CONFIG[effectKey]?.name} 将持续 ${duration} 回合`, 'cyan');
                    }
                }
            });
            
            updateTurnDisplay();
        }

        function applyEffect(effectKey, sourceValue, count) {
            const config = EFFECT_PARAMS_CONFIG[effectKey];
            if (!config) return;
            const params = testSkill.params;

            // 判断是否基于攻击力
            const effectSource = testSkill.params[`${effectKey}_effect-source`];
            const isAttackBased = effectSource && (
                effectSource.includes('attack') ||
                effectSource === 'self-current-attack' ||
                effectSource === 'self-base-attack' ||
                effectSource === 'enemy-current-attack' ||
                effectSource === 'enemy-base-attack'
            );

            switch(effectKey) {
                case 'direct_attack': {
                    // 直接攻击：如果基于攻击力则计算防御，否则直接伤害
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const rawDamage = Math.round(sourceValue * bonus);
                    let actualDamage;
                    
                    if (isAttackBased) {
                        actualDamage = Math.max(1, rawDamage - battleState.enemy.defense);
                        addLog(`直接攻击: ${rawDamage} - ${battleState.enemy.defense}(防御) = ${actualDamage} 点伤害`, 'red');
                    } else {
                        actualDamage = rawDamage;
                        addLog(`直接攻击: ${actualDamage} 点伤害 (${Math.round(sourceValue)} × ${bonus})`, 'red');
                    }
                    
                    // 应用属性增伤/减伤
                    actualDamage = applyElementDamageModifiers(actualDamage);
                    
                    battleState.enemy.hp -= actualDamage;
                    battleState.self.turnDamage += actualDamage;
                    break;
                }
                case 'multi_attack': {
                    // 多段攻击：如果基于攻击力则每段计算防御
                    const bonuses = params[`${effectKey}_multi-bonus`] || [1];
                    let totalDamage = 0;
                    
                    bonuses.forEach((bonus, i) => {
                        const rawDamage = Math.round(sourceValue * bonus);
                        let actualDamage;
                        
                        if (isAttackBased) {
                            actualDamage = Math.max(1, rawDamage - battleState.enemy.defense);
                            addLog(`多段攻击-第${i+1}段: ${rawDamage} - ${battleState.enemy.defense} = ${actualDamage} 点伤害`, 'red');
                        } else {
                            actualDamage = rawDamage;
                            addLog(`多段攻击-第${i+1}段: ${actualDamage} 点伤害`, 'red');
                        }
                        
                        totalDamage += actualDamage;
                    });
                    
                    // 应用属性增伤/减伤
                    totalDamage = applyElementDamageModifiers(totalDamage);
                    
                    battleState.enemy.hp -= totalDamage;
                    battleState.self.turnDamage += totalDamage;
                    addLog(`多段攻击总计: ${totalDamage} 点伤害`, 'red');
                    break;
                }
                case 'dot_damage': {
                    // 附加伤害：如果基于攻击力则计算防御
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const rawDamage = Math.round(sourceValue * count * bonus);
                    let actualDamage;
                    
                    if (isAttackBased) {
                        actualDamage = Math.max(1, rawDamage - battleState.enemy.defense);
                        addLog(`附加伤害: ${rawDamage} - ${battleState.enemy.defense} = ${actualDamage} 点伤害`, 'red');
                    } else {
                        actualDamage = rawDamage;
                        addLog(`附加伤害: ${actualDamage} 点伤害`, 'red');
                    }
                    
                    // 应用属性增伤/减伤
                    actualDamage = applyElementDamageModifiers(actualDamage);
                    
                    battleState.enemy.hp -= actualDamage;
                    battleState.self.turnDamage += actualDamage;
                    break;
                }
                case 'percent_damage': {
                    // 百分比伤害：始终为真实伤害
                    const percent = params[`${effectKey}_percent`] || 0.1;
                    let damage = Math.round(sourceValue * count * percent);
                    
                    // 应用属性增伤/减伤
                    damage = applyElementDamageModifiers(damage);
                    
                    battleState.enemy.hp -= damage;
                    battleState.self.turnDamage += damage;
                    addLog(`百分比伤害: ${damage} 点真实伤害`, 'red');
                    break;
                }
                case 'buff_attack': {
                    // 增攻：攻击力=效果来源*增攻加成
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const increase = Math.round(sourceValue * bonus);
                    if (target === 'self' || target === 'ally-all') {
                        battleState.self.attack += increase;
                        addLog(`增攻: 我方攻击力 +${increase} (${Math.round(sourceValue)} × ${bonus})`, 'green');
                    }
                    break;
                }
                case 'buff_defense': {
                    // 增防：防御力=效果来源*增防加成
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const increase = Math.round(sourceValue * bonus);
                    if (target === 'self' || target === 'ally-all') {
                        battleState.self.defense += increase;
                        addLog(`增防: 我方防御力 +${increase} (${Math.round(sourceValue)} × ${bonus})`, 'green');
                    }
                    break;
                }
                case 'buff_speed': {
                    // 增速：敏捷力=效果来源*增速加成
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const increase = Math.round(sourceValue * bonus);
                    if (target === 'self' || target === 'ally-all') {
                        battleState.self.agility += increase;
                        addLog(`增速: 我方敏捷 +${increase} (${Math.round(sourceValue)} × ${bonus})`, 'green');
                    }
                    break;
                }
                case 'direct_defense': {
                    // 直接防御：防御值=当前防御值+效果来源*防御加成
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const increase = Math.round(sourceValue * bonus);
                    battleState.self.defense += increase;
                    addLog(`直接防御: 我方防御力 +${increase} (${Math.round(sourceValue)} × ${bonus})`, 'green');
                    break;
                }
                case 'continuous_defense': {
                    // 持续防御：防御值=当前防御值+效果来源*防御加成
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const increase = Math.round(sourceValue * bonus);
                    battleState.self.defense += increase;
                    addLog(`持续防御: 我方防御力 +${increase} (${Math.round(sourceValue)} × ${bonus})`, 'green');
                    break;
                }
                case 'defense_counter': {
                    // 防御反击：使用防御效果来源增加防御，使用反击效果来源计算反击伤害
                    const defBonus = params[`${effectKey}_defense-bonus`] || 1;
                    const counterBonus = params[`${effectKey}_counter-bonus`] || 0.5;
                    
                    // 防御部分：使用防御效果来源
                    const defIncrease = Math.round(sourceValue * defBonus);
                    battleState.self.defense += defIncrease;
                    addLog(`防御反击-防御: 防御力 +${defIncrease} (${Math.round(sourceValue)} × ${defBonus})`, 'green');
                    
                    // 反击部分：使用反击效果来源
                    const counterSource = params[`${effectKey}_counter-effect-source`];
                    const counterSourceValue = getEffectSourceValue(counterSource);
                    const counterDamage = Math.round(counterSourceValue * counterBonus);
                    
                    battleState.enemy.hp -= counterDamage;
                    battleState.self.turnDamage += counterDamage;
                    addLog(`防御反击-反击: 造成 ${counterDamage} 点伤害 (${Math.round(counterSourceValue)} × ${counterBonus})`, 'red');
                    break;
                }
                case 'direct_speed': {
                    // 直接增速：敏捷=当前敏捷值+效果来源*增速加成
                    const bonus = params[`${effectKey}_bonus`] || 0.2;
                    const increase = Math.round(sourceValue * bonus);
                    battleState.self.agility += increase;
                    addLog(`直接增速: 我方敏捷 +${increase} (${Math.round(sourceValue)} × ${bonus})`, 'green');
                    break;
                }
                case 'continuous_speed': {
                    // 持续增速：敏捷=当前敏捷值+效果来源*增速加成
                    const bonus = params[`${effectKey}_bonus`] || 0.2;
                    const increase = Math.round(sourceValue * bonus);
                    battleState.self.agility += increase;
                    addLog(`持续增速: 我方敏捷 +${increase} (${Math.round(sourceValue)} × ${bonus})`, 'green');
                    break;
                }
                case 'debuff_attack': {
                    // 减攻：攻击力=效果来源*减攻加成
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const decrease = Math.round(sourceValue * bonus);
                    if (target === 'enemy-single' || target === 'enemy-all') {
                        battleState.enemy.attack = Math.max(0, battleState.enemy.attack - decrease);
                        addLog(`减攻: 敌方攻击力 -${decrease} (${Math.round(sourceValue)} × ${bonus})`, 'purple');
                    }
                    break;
                }
                case 'debuff_defense': {
                    // 减防：防御力=效果来源*减防加成
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const decrease = Math.round(sourceValue * bonus);
                    if (target === 'enemy-single' || target === 'enemy-all') {
                        battleState.enemy.defense = Math.max(0, battleState.enemy.defense - decrease);
                        addLog(`减防: 敌方防御力 -${decrease} (${Math.round(sourceValue)} × ${bonus})`, 'purple');
                    }
                    break;
                }
                case 'debuff_speed': {
                    // 减速：敏捷力=效果来源*减速加成
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const decrease = Math.round(sourceValue * bonus);
                    if (target === 'enemy-single' || target === 'enemy-all') {
                        battleState.enemy.agility = Math.max(0, battleState.enemy.agility - decrease);
                        addLog(`减速: 敌方敏捷 -${decrease} (${Math.round(sourceValue)} × ${bonus})`, 'purple');
                    }
                    break;
                }
                case 'heal_direct': {
                    // 直接恢复：恢复量=效果来源*治疗加成*每回合恢复次数
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const heal = Math.round(sourceValue * bonus * count);
                    if (target === 'self' || target === 'ally-all') {
                        battleState.self.hp = Math.min(battleState.self.maxHp, battleState.self.hp + heal);
                        addLog(`直接恢复: +${heal} 生命 (${Math.round(sourceValue)} × ${bonus} × ${count})`, 'green');
                    }
                    break;
                }
                case 'heal_continuous': {
                    // 持续恢复：恢复量=效果来源*治疗加成*每回合恢复次数
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const heal = Math.round(sourceValue * bonus * count);
                    if (target === 'self' || target === 'ally-all') {
                        battleState.self.hp = Math.min(battleState.self.maxHp, battleState.self.hp + heal);
                        addLog(`持续恢复: +${heal} 生命 (${Math.round(sourceValue)} × ${bonus} × ${count})`, 'green');
                    }
                    break;
                }
                case 'heal_percent': {
                    // 百分比恢复：效果来源*恢复百分比*每回合恢复次数
                    const target = params[`${effectKey}_target`];
                    const percent = params[`${effectKey}_percent`] || 0.1;
                    const heal = Math.round(sourceValue * percent * count);
                    if (target === 'self' || target === 'ally-all') {
                        battleState.self.hp = Math.min(battleState.self.maxHp, battleState.self.hp + heal);
                        addLog(`百分比恢复: +${heal} 生命 (${Math.round(sourceValue)} × ${percent} × ${count})`, 'green');
                    }
                    break;
                }
                case 'heal_lifesteal': {
                    // 生命汲取：效果来源*汲取加成*每回合汲取次数
                    const bonus = params[`${effectKey}_bonus`] || 0.2;
                    const heal = Math.round(sourceValue * bonus * count);
                    battleState.self.hp = Math.min(battleState.self.maxHp, battleState.self.hp + heal);
                    addLog(`生命汲取: +${heal} 生命 (${Math.round(sourceValue)} × ${bonus} × ${count})`, 'green');
                    break;
                }
                case 'buff_purify': {
                    // 净化：根据类型和数量清除异常状态
                    const target = params[`${effectKey}_target`];
                    const purifyType = params[`${effectKey}_purify-type`] || 'all';
                    const purifyCount = params[`${effectKey}_purify-count`] || 'all';
                    
                    if (target === 'self' || target === 'ally-all') {
                        const beforeCount = battleState.self.statuses.length;
                        let targetStatuses = [];
                        
                        // 根据类型筛选要驱散的状态
                        if (purifyType === 'all') {
                            targetStatuses = battleState.self.statuses;
                        } else if (['negative', 'positive', 'neutral'].includes(purifyType)) {
                            // 按状态类型筛选
                            targetStatuses = battleState.self.statuses.filter(s => {
                                const statusType = s.data?.statusType || 'negative';
                                return statusType === purifyType;
                            });
                        } else {
                            // 指定状态key
                            targetStatuses = battleState.self.statuses.filter(s => s.key === purifyType);
                        }
                        
                        // 根据数量驱散（按施加时间从旧到新）
                        let removedCount = 0;
                        if (purifyCount === 'all') {
                            // 移除所有符合条件的状态
                            battleState.self.statuses = battleState.self.statuses.filter(s =>
                                !targetStatuses.includes(s)
                            );
                            removedCount = targetStatuses.length;
                        } else {
                            // 移除指定数量
                            const count = parseInt(purifyCount) || 1;
                            const toRemove = targetStatuses.slice(0, count);
                            battleState.self.statuses = battleState.self.statuses.filter(s =>
                                !toRemove.includes(s)
                            );
                            removedCount = toRemove.length;
                        }
                        
                        // 日志输出
                        if (removedCount > 0) {
                            const typeNames = {
                                'all': '全部',
                                'negative': '负面',
                                'positive': '正面',
                                'neutral': '中性'
                            };
                            const typeName = typeNames[purifyType] || (() => {
                                const statusPool = JSON.parse(localStorage.getItem('STATUS_POOL') || '[]');
                                const status = statusPool.find(s => s.key === purifyType);
                                return status ? status.name : purifyType;
                            })();
                            addLog(`净化: 清除我方 ${removedCount} 个${typeName}状态 (共${beforeCount}个)`, 'green');
                        } else {
                            addLog(`净化: 无可清除的目标状态`, 'gray');
                        }
                    }
                    break;
                }
                case 'buff_status_enemy': {
                    // 为敌方附加异常状态
                    const statusType = params[`${effectKey}_status-type`];
                    const statusChance = params[`${effectKey}_status-chance`] || 100;
                    const statusStacks = params[`${effectKey}_status-stacks`] || 1;
                    const random = Math.random() * 100;
                    
                    if (random <= statusChance) {
                        const statusPool = JSON.parse(localStorage.getItem('STATUS_POOL') || '[]');
                        const statusData = statusPool.find(s => s.key === statusType);
                        const statusName = statusData ? statusData.name : statusType;
                        
                        // 查找是否已有此状态
                        const existingStatus = battleState.enemy.statuses.find(s => s.key === statusType);
                        
                        if (existingStatus) {
                            // 已有状态，增加层数并重置状态持续时间
                            const maxStacks = statusData?.maxStacks || 99;
                            const oldStacks = existingStatus.stackDurations.length;
                            const durationPerStack = statusData?.durationPerStack || 3;
                            const canAdd = Math.min(maxStacks - oldStacks, statusStacks);
                            
                            // 重置状态持续回合（无论是否能添加新层都刷新状态）
                            const statusDuration = statusData?.isPermanent ? 999 : (statusData?.statusDuration || 10);
                            existingStatus.statusDuration = statusDuration;
                            
                            if (canAdd > 0) {
                                for (let i = 0; i < canAdd; i++) {
                                    existingStatus.stackDurations.push(durationPerStack);
                                }
                                
                                addLog(`施加异常: 敌方 ${statusName} ${oldStacks}→${existingStatus.stackDurations.length}层 (状态已刷新)`, 'purple');
                                // 立即触发新层的效果
                                if (statusData && statusData.effects) {
                                    addLog(`→ 新层立即生效`, 'cyan');
                                    statusData.effects.forEach(effectKey => {
                                        applyStatusEffect('enemy', existingStatus, effectKey, battleState, addLog);
                                    });
                                }
                            } else {
                                // 即使达到最大层数，也显示状态刷新信息
                                addLog(`施加异常: 敌方 ${statusName} 持续时间已刷新 (${oldStacks}层)`, 'purple');
                            }
                        } else {
                            // 新状态（每层独立持续时间）
                            const durationPerStack = statusData?.durationPerStack || 3;
                            const stackDurations = [];
                            
                            for (let i = 0; i < statusStacks; i++) {
                                stackDurations.push(durationPerStack);
                            }
                            
                            const newStatus = {
                                key: statusType,
                                stackDurations: stackDurations,
                                data: statusData
                            };
                            battleState.enemy.statuses.push(newStatus);
                            addLog(`施加异常: 敌方获得 ${statusName} ×${statusStacks}层，各${durationPerStack}回合 (${statusChance}%概率成功)`, 'purple');
                            
                            // 立即触发新状态的效果
                            if (statusData && statusData.effects) {
                                addLog(`→ 状态立即生效`, 'cyan');
                                statusData.effects.forEach(effectKey => {
                                    applyStatusEffect('enemy', newStatus, effectKey, battleState, addLog);
                                });
                            }
                        }
                    } else {
                        addLog(`施加异常: 未触发 (${Math.round(random)}% > ${statusChance}%)`, 'gray');
                    }
                    break;
                }
                case 'debuff_status_self': {
                    // 为自身附加异常状态
                    const statusType = params[`${effectKey}_status-type`];
                    const statusChance = params[`${effectKey}_status-chance`] || 100;
                    const statusStacks = params[`${effectKey}_status-stacks`] || 1;
                    const random = Math.random() * 100;
                    
                    if (random <= statusChance) {
                        const statusPool = JSON.parse(localStorage.getItem('STATUS_POOL') || '[]');
                        const statusData = statusPool.find(s => s.key === statusType);
                        const statusName = statusData ? statusData.name : statusType;
                        
                        // 查找是否已有此状态
                        const existingStatus = battleState.self.statuses.find(s => s.key === statusType);
                        
                        if (existingStatus) {
                            // 已有状态，增加层数并重置状态持续时间
                            const maxStacks = statusData?.maxStacks || 99;
                            const oldStacks = existingStatus.stackDurations.length;
                            const durationPerStack = statusData?.durationPerStack || 3;
                            const canAdd = Math.min(maxStacks - oldStacks, statusStacks);
                            
                            // 重置状态持续回合（无论是否能添加新层都刷新状态）
                            const statusDuration = statusData?.isPermanent ? 999 : (statusData?.statusDuration || 10);
                            existingStatus.statusDuration = statusDuration;
                            
                            if (canAdd > 0) {
                                for (let i = 0; i < canAdd; i++) {
                                    existingStatus.stackDurations.push(durationPerStack);
                                }
                                
                                addLog(`自身异常: ${statusName} ${oldStacks}→${existingStatus.stackDurations.length}层 (状态已刷新)`, 'purple');
                                // 立即触发新层的效果
                                if (statusData && statusData.effects) {
                                    addLog(`→ 新层立即生效`, 'cyan');
                                    statusData.effects.forEach(effectKey => {
                                        applyStatusEffect('self', existingStatus, effectKey, battleState, addLog);
                                    });
                                }
                            } else {
                                // 即使达到最大层数，也显示状态刷新信息
                                addLog(`自身异常: ${statusName} 持续时间已刷新 (${oldStacks}层)`, 'purple');
                            }
                        } else {
                            // 新状态（包含状态持续时间和层数持续时间）
                            const statusDuration = statusData?.isPermanent ? 999 : (statusData?.statusDuration || 10);
                            const hasStacks = statusData?.hasStacks !== false; // 默认true兼容旧数据
                            
                            const newStatus = {
                                key: statusType,
                                statusDuration: statusDuration, // 状态本身的持续时间
                                data: statusData
                            };
                            
                            let logMessage = `自身异常: 获得 ${statusName}`;
                            const statusDurationText = statusData?.isPermanent ? '永久' : `${statusDuration}回合`;
                            
                            if (hasStacks) {
                                // 有层数系统
                                const durationPerStack = statusData?.isStackPermanent ? 999 : (statusData?.durationPerStack || 3);
                                const stackDurations = [];
                                
                                for (let i = 0; i < statusStacks; i++) {
                                    stackDurations.push(durationPerStack);
                                }
                                
                                newStatus.stackDurations = stackDurations;
                                const stackDurationText = statusData?.isStackPermanent ? '层数永久' : `层各${durationPerStack}回合`;
                                logMessage += ` (状态${statusDurationText}，×${statusStacks}${stackDurationText})`;
                            } else {
                                // 无层数系统
                                logMessage += ` (状态${statusDurationText})`;
                            }
                            
                            battleState.self.statuses.push(newStatus);
                            addLog(`${logMessage} (${statusChance}%概率)`, 'purple');
                            
                            // 立即触发新状态的效果
                            if (statusData && statusData.effects) {
                                addLog(`→ 状态立即生效`, 'cyan');
                                statusData.effects.forEach(effectKey => {
                                    applyStatusEffect('self', newStatus, effectKey, battleState, addLog);
                                });
                            }
                        }
                    } else {
                        addLog(`自身异常: 未触发 (${Math.round(random)}% > ${statusChance}%)`, 'gray');
                    }
                    break;
                }
                case 'debuff_no_heal': {
                    // 禁疗（作为特殊状态标记处理）
                    const target = params[`${effectKey}_target`];
                    if (target === 'enemy-single' || target === 'enemy-all') {
                        const hasNoHeal = battleState.enemy.statuses.some(s => s.key === 'no-heal');
                        if (!hasNoHeal) {
                            battleState.enemy.statuses.push({ key: 'no-heal', stackDurations: [999], data: { isPermanent: true } });
                            addLog(`禁疗: 敌方无法恢复生命`, 'purple');
                        }
                    }
                    break;
                }
                case 'debuff_heal_reduce': {
                    // 减疗（作为特殊状态标记处理）
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 0.5;
                    if (target === 'enemy-single' || target === 'enemy-all') {
                        const hasHealReduce = battleState.enemy.statuses.some(s => s.key === 'heal-reduce');
                        if (!hasHealReduce) {
                            battleState.enemy.statuses.push({ key: 'heal-reduce', stackDurations: [999], data: { isPermanent: true } });
                            addLog(`减疗: 敌方治疗效果降低 ${Math.round(bonus * 100)}%`, 'purple');
                        }
                    }
                    break;
                }
                case 'buff_element_damage': {
                    // 属性增伤：该属性目标的最终伤害=最终伤害*(1+增伤加成)
                    const target = params[`${effectKey}_target`];
                    const elementType = params[`${effectKey}_element-type`] || 'fire';
                    const damageBonus = params[`${effectKey}_damage-bonus`] || 0.2;
                    
                    if (target === 'self' || target === 'ally-all') {
                        if (!battleState.self.elementDamageBonus) battleState.self.elementDamageBonus = {};
                        battleState.self.elementDamageBonus[elementType] =
                            (battleState.self.elementDamageBonus[elementType] || 0) + damageBonus;
                        addLog(`属性增伤: 我方对${getElementName(elementType)}系伤害 +${Math.round(damageBonus * 100)}% (当前敌方系别:${getElementName(battleState.enemy.element)})`, 'green');
                    }
                    break;
                }
                case 'debuff_element_damage': {
                    // 属性减伤：受到该属性最终伤害=最终伤害*(1-减伤加成)
                    const target = params[`${effectKey}_target`];
                    const elementType = params[`${effectKey}_element-type`] || 'fire';
                    const damageReduce = params[`${effectKey}_damage-reduce`] || 0.2;
                    
                    if (target === 'enemy-single' || target === 'enemy-all') {
                        if (!battleState.enemy.elementDamageReduce) battleState.enemy.elementDamageReduce = {};
                        battleState.enemy.elementDamageReduce[elementType] =
                            (battleState.enemy.elementDamageReduce[elementType] || 0) + damageReduce;
                        addLog(`属性减伤: 敌方受到${getElementName(elementType)}系伤害 -${Math.round(damageReduce * 100)}% (当前我方系别:${getElementName(battleState.self.element)})`, 'purple');
                    }
                    break;
                }
                case 'debuff_hp_cost': {
                    // 扣血：消耗生命值=效果来源*扣血加成
                    const target = params[`${effectKey}_target`];
                    const bonus = params[`${effectKey}_bonus`] || 1;
                    const hpCost = Math.round(sourceValue * bonus);
                    
                    if (target === 'self' || target === 'ally-all') {
                        battleState.self.hp = Math.max(1, battleState.self.hp - hpCost);
                        addLog(`扣血: 我方消耗 ${hpCost} 生命值 (${Math.round(sourceValue)} × ${bonus})`, 'purple');
                    } else if (target === 'enemy-single' || target === 'enemy-all') {
                        battleState.enemy.hp = Math.max(1, battleState.enemy.hp - hpCost);
                        addLog(`扣血: 敌方消耗 ${hpCost} 生命值 (${Math.round(sourceValue)} × ${bonus})`, 'purple');
                    }
                    break;
                }
                default:
                    addLog(`[${config.name}] 已触发（简化模拟）`, 'gray');
            }
        }

        function getElementName(element) {
            const names = {
                'normal': '普通', 'water': '水', 'fire': '火', 'grass': '草',
                'wind': '风', 'metal': '金', 'earth': '土'
            };
            return names[element] || element;
        }

        // 应用属性增伤/减伤
        function applyElementDamageModifiers(baseDamage) {
            let finalDamage = baseDamage;
            const selfElement = battleState.self.element;
            const enemyElement = battleState.enemy.element;
            
            console.log('调试-属性增伤:', {
                baseDamage, selfElement, enemyElement,
                selfBonus: battleState.self.elementDamageBonus,
                enemyReduce: battleState.enemy.elementDamageReduce
            });
            
            // 应用属性克制倍率
            const advantageMultiplier = getElementAdvantageMultiplier(selfElement, enemyElement);
            if (advantageMultiplier !== 1.0) {
                const oldDamage = finalDamage;
                finalDamage = Math.round(finalDamage * advantageMultiplier);
                const advantageText = advantageMultiplier > 1 ? '克制' : '被克制';
                addLog(`  → 属性${advantageText}(${getElementName(selfElement)}对${getElementName(enemyElement)}): ${oldDamage} × ${advantageMultiplier} = ${finalDamage}`, advantageMultiplier > 1 ? 'green' : 'red');
            }
            
            // 应用我方的属性增伤（针对敌方系别）
            if (battleState.self.elementDamageBonus && battleState.self.elementDamageBonus[enemyElement]) {
                const bonus = battleState.self.elementDamageBonus[enemyElement];
                const oldDamage = finalDamage;
                finalDamage = Math.round(finalDamage * (1 + bonus));
                addLog(`  → 属性增伤(对${getElementName(enemyElement)}系): ${oldDamage} × (1+${bonus}) = ${finalDamage}`, 'cyan');
            }
            
            // 应用敌方的属性减伤（针对我方系别）
            if (battleState.enemy.elementDamageReduce && battleState.enemy.elementDamageReduce[selfElement]) {
                const reduce = battleState.enemy.elementDamageReduce[selfElement];
                const oldDamage = finalDamage;
                finalDamage = Math.round(finalDamage * (1 - reduce));
                addLog(`  → 属性减伤(受${getElementName(selfElement)}系): ${oldDamage} × (1-${reduce}) = ${finalDamage}`, 'cyan');
            }
            
            return Math.max(1, finalDamage);
        }

        // 清除临时增益效果
        function clearTemporaryBuffs() {
            // 检查是否有对应属性的持续效果
            const activeElementBuffs = activeEffects.filter(e => e.isTempBuff).map(e => {
                const params = e.skill.params;
                return params[`${e.effectKey}_element-type`];
            });
            
            // 清除没有持续效果的属性增伤
            if (battleState.self.elementDamageBonus) {
                Object.keys(battleState.self.elementDamageBonus).forEach(elem => {
                    if (!activeElementBuffs.includes(elem)) {
                        delete battleState.self.elementDamageBonus[elem];
                        addLog(`清除临时属性增伤(${getElementName(elem)}系)`, 'gray');
                    }
                });
            }
            
            // 清除没有持续效果的属性减伤
            if (battleState.enemy.elementDamageReduce) {
                Object.keys(battleState.enemy.elementDamageReduce).forEach(elem => {
                    if (!activeElementBuffs.includes(elem)) {
                        delete battleState.enemy.elementDamageReduce[elem];
                        addLog(`清除临时属性减伤(${getElementName(elem)}系)`, 'gray');
                    }
                });
            }
        }

        // 初始化应用
        init();
        
        // 设置导入模态框事件监听器
        document.getElementById('close-import-modal').onclick = closeImportModal;
        document.getElementById('cancel-import-btn').onclick = closeImportModal;
        document.getElementById('confirm-import-btn').onclick = importSkills;
        document.getElementById('import-modal').onclick = (e) => {
            if (e.target.id === 'import-modal') closeImportModal();
        };
    </script>
</body>
