<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子盆栽 - 战斗场景</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111827;
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .battle-container {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .battle-arena {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-grow: 1;
            position: relative;
        }

        .animal-card {
            background: rgba(31, 41, 55, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #4b5563;
            border-radius: 1rem;
            padding: 1.5rem;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        /* 攻击抖动效果 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        /* 防御发光效果 */
        @keyframes defend-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 30px rgba(59, 130, 246, 1); }
        }
        .animate-defend {
            animation: defend-glow 0.5s ease-in-out;
            border-color: #3b82f6 !important;
        }

        /* 技能激活效果 */
        @keyframes skill-activate {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(167, 139, 250, 0); }
            50% { transform: scale(1.1); box-shadow: 0 0 25px rgba(167, 139, 250, 1); }
            100% { transform: scale(1); box-shadow: 0 0 0 rgba(167, 139, 250, 0); }
        }
        .skill-triggered {
            animation: skill-activate 0.6s ease-in-out;
            border-color: #a78bfa !important;
            border-width: 3px !important;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.6) 0%, rgba(236, 72, 153, 0.6) 100%) !important;
        }
        
        /* 持续生效的技能高亮 */
        @keyframes skill-active-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(34, 197, 94, 0.6); }
            50% { box-shadow: 0 0 20px rgba(34, 197, 94, 1); }
        }
        .skill-active {
            animation: skill-active-glow 1.5s ease-in-out infinite;
            border-color: #22c55e !important;
            border-width: 3px !important;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.4) 0%, rgba(16, 185, 129, 0.4) 100%) !important;
        }

        .animal-card:hover {
            transform: translateY(-10px);
        }

        .animal-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            border: 4px solid;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
        }

        .health-bar-container {
            background-color: #4b5563;
            border-radius: 9999px;
            height: 1rem;
            width: 100%;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .health-bar {
            background-color: #22c55e;
            height: 100%;
            border-radius: 9999px;
            transition: width 0.5s ease-in-out;
        }

        .opponent .animal-avatar {
            border-color: #ef4444;
        }

        .player .animal-avatar {
            border-color: #3b82f6;
        }

        .action-panel {
            background: rgba(17, 24, 39, 0.9);
            padding: 1rem;
            border-radius: 1rem;
            border-top: 1px solid #374151;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .action-button {
            background-color: #3b82f6;
            color: white;
            font-weight: bold;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            min-width: 120px;
        }

        .action-button:hover:not(:disabled) {
            background-color: #2563eb;
        }

        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .flee-button {
            background-color: #6b7280;
        }

        .flee-button:hover {
            background-color: #4b5563;
        }

        .vs-text {
            font-size: 4rem;
            font-weight: bold;
            color: #ef4444;
            text-shadow: 0 0 15px #ef4444;
        }

        .return-button {
            background-color: #22c55e;
            color: white;
            font-weight: bold;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            min-width: 240px;
        }

        /* 回合指示器 */
        .turn-indicator {
            position: absolute;
            top: -2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(59, 130, 246, 0.9);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 0.875rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="battle-container">
        <!-- 战斗日志 (顶部) - 滚动日志面板 -->
        <div class="bg-gray-900/80 rounded-lg border border-gray-700 mb-4" style="height: 150px; overflow-y: auto;">
            <div id="battle-log" class="text-sm space-y-1 font-mono p-4">
                <div class="text-yellow-300">⚔️ 战斗准备中...</div>
            </div>
        </div>

        <!-- 战斗区域 -->
        <div class="battle-arena">
            <!-- 我方动物 -->
            <div id="player-card" class="animal-card player" style="position: relative;">
                <div id="player-turn-indicator" class="turn-indicator" style="display: none;">我的回合</div>
                <div id="player-avatar" class="animal-avatar"></div>
                <h2 id="player-name" class="text-2xl font-bold">玩家动物</h2>
                <p id="player-level" class="text-sm text-gray-400">Lv. 1</p>
                <div class="flex justify-center items-center gap-2 my-1">
                    <span id="player-element" class="text-sm font-bold px-3 py-1 rounded-full bg-blue-600 text-white">💧 水系</span>
                </div>
                <div class="health-bar-container">
                    <div id="player-health-bar" class="health-bar"></div>
                </div>
                <p id="player-health-text" class="text-xs mt-1">100 / 100</p>
                <div class="mt-2 text-xs text-gray-400">
                    <span>⚔️ <span id="player-atk">10</span></span>
                    <span class="ml-2">🛡️ <span id="player-def">5</span></span>
                    <span class="ml-2">⚡ <span id="player-agi">8</span></span>
                </div>
                
                <!-- 异常状态显示 -->
                <div class="mt-2 pt-2 border-t border-gray-600">
                    <p class="text-xs text-gray-400 mb-1">🔮 异常状态</p>
                    <div id="player-status" class="flex flex-wrap gap-1 min-h-[24px]">
                        <span class="text-xs text-gray-500">无</span>
                    </div>
                </div>
                
                <!-- 技能槽显示 -->
                <div class="mt-3 pt-3 border-t border-gray-600">
                    <p class="text-xs text-gray-400 mb-2">装备技能</p>
                    <div id="player-skill-slots" class="grid grid-cols-2 gap-2">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- VS 和克制关系显示 -->
            <div class="flex flex-col items-center gap-3">
                <!-- 联赛比分显示（仅联赛战斗时显示） -->
                <div id="league-score-display" style="display: none;">
                    <div class="text-xs text-gray-400 text-center mb-2">比分详情</div>
                    <div class="flex gap-6 items-center justify-center">
                        <!-- 我方比分圈 -->
                        <div class="flex flex-col items-center gap-1">
                            <div class="text-xs text-blue-400 font-bold mb-1">我方</div>
                            <div id="player-score-circles" class="flex gap-1">
                                <!-- 动态生成5个圈 -->
                            </div>
                        </div>
                        <!-- VS -->
                        <div class="text-2xl font-bold text-gray-400">VS</div>
                        <!-- 对方比分圈 -->
                        <div class="flex flex-col items-center gap-1">
                            <div class="text-xs text-red-400 font-bold mb-1">对方</div>
                            <div id="opponent-score-circles" class="flex gap-1">
                                <!-- 动态生成5个圈 -->
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="vs-text">VS</div>
                <div id="advantage-indicator" class="text-sm font-bold px-4 py-2 rounded-lg bg-gray-800 border border-gray-600 text-gray-400">
                    无克制
                </div>
            </div>

            <!-- 敌方动物 -->
            <div id="opponent-card" class="animal-card opponent" style="position: relative;">
                <div id="opponent-turn-indicator" class="turn-indicator" style="display: none;">敌方回合</div>
                <div id="opponent-avatar" class="animal-avatar"></div>
                <h2 id="opponent-name" class="text-2xl font-bold">野生动物</h2>
                <p id="opponent-level" class="text-sm text-gray-400">Lv. 1</p>
                <div class="flex justify-center items-center gap-2 my-1">
                    <span id="opponent-element" class="text-sm font-bold px-3 py-1 rounded-full bg-red-600 text-white">🔥 火系</span>
                </div>
                <div class="health-bar-container">
                    <div id="opponent-health-bar" class="health-bar bg-red-500"></div>
                </div>
                <p id="opponent-health-text" class="text-xs mt-1">100 / 100</p>
                <div class="mt-2 text-xs text-gray-400">
                    <span>⚔️ <span id="opponent-atk">10</span></span>
                    <span class="ml-2">🛡️ <span id="opponent-def">5</span></span>
                    <span class="ml-2">⚡ <span id="opponent-agi">8</span></span>
                </div>
                
                <!-- 异常状态显示 -->
                <div class="mt-2 pt-2 border-t border-gray-600">
                    <p class="text-xs text-gray-400 mb-1">🔮 异常状态</p>
                    <div id="opponent-status" class="flex flex-wrap gap-1 min-h-[24px]">
                        <span class="text-xs text-gray-500">无</span>
                    </div>
                </div>
                
                <!-- 技能槽显示 -->
                <div class="mt-3 pt-3 border-t border-gray-600">
                    <p class="text-xs text-gray-400 mb-2">装备技能</p>
                    <div id="opponent-skill-slots" class="grid grid-cols-2 gap-2">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 操作面板 -->
        <div class="action-panel">
            <button id="btn-start-battle" class="action-button bg-green-600 hover:bg-green-700">开始自动战斗</button>
            <button id="btn-pause" class="action-button bg-yellow-600 hover:bg-yellow-700" style="display: none;">⏸ 暂停</button>
            <button id="btn-flee" class="action-button flee-button">逃跑</button>
        </div>
    </div>

    <!-- 引入图像库和战斗系统 -->
    <script src="../scripts/image_library.js"></script>
    <script src="../scripts/battle_system.js"></script>
    <script>
        window.onload = function() {
            const opponentData = JSON.parse(localStorage.getItem('battleOpponent'));
            const playerData = JSON.parse(localStorage.getItem('battlePlayerAnimal'));

            if (!opponentData || !playerData) {
                alert("战斗数据加载失败！将返回主场景。");
                window.location.href = '../pages/game3d.html';
                return;
            }

            // 初始化战斗系统
            const battleSystem = new BattleSystem(playerData, opponentData);
            battleSystem.init();
            
            // 检查是否是联赛战斗，如果是则自动开始
            const leagueBattleQueue = localStorage.getItem('leagueBattleQueue');
            if (leagueBattleQueue) {
                // 联赛战斗自动开始（延迟1秒让玩家看到界面）
                setTimeout(() => {
                    battleSystem.startBattle();
                }, 1000);
            }
        };
    </script>

    </script>

</body>
</html>
