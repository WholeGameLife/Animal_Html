<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动物图鉴 - 电子盆栽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入图像库系统 -->
    <script src="../scripts/image_library.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a1120 0%, #1e293b 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        
        .tab-btn {
            transition: all 0.3s ease;
        }
        
        .tab-btn:not(.active):hover {
            background: rgba(55, 65, 81, 0.5);
        }
        
        .encyclopedia-filter-btn, .mutation-filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
            background: rgba(55, 65, 81, 0.5);
            border: 1px solid rgba(75, 85, 99, 0.5);
            color: #9ca3af;
        }
        
        .encyclopedia-filter-btn:hover {
            background: rgba(75, 85, 99, 0.7);
            color: #e5e7eb;
        }
        
        .encyclopedia-filter-btn.active {
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            border-color: #14b8a6;
            color: white;
            box-shadow: 0 4px 12px rgba(20, 184, 166, 0.4);
        }
        
        .species-card {
            transition: all 0.3s ease;
        }
        
        .species-card:hover {
            transform: translateY(-5px);
        }
        
        .rarity-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .rarity-common { background: linear-gradient(135deg, #6b7280, #4b5563); }
        .rarity-shiny { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .rarity-prismatic { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        .rarity-stellar { background: linear-gradient(135deg, #fef3c7, #fbbf24); color: #92400e; }
        
        .element-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .element-water { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .element-fire { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .element-grass { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .element-wind { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .element-electric { background: linear-gradient(135deg, #eab308, #ca8a04); }
        .element-earth { background: linear-gradient(135deg, #a16207, #854d0e); }
        
        .stat-bar {
            height: 6px;
            background: rgba(75, 85, 99, 0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .stat-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.5);
            border-radius: 4px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(75, 85, 99, 0.8);
            border-radius: 4px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(107, 114, 128, 1);
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <!-- 标题栏 -->
        <div class="bg-gray-900/80 backdrop-blur-lg rounded-xl p-6 mb-6 border border-gray-700">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400 mb-2">📖 动物图鉴</h1>
                    <p class="text-gray-400">探索和收集所有动物物种及其稀有度变体</p>
                </div>
                <button id="btn-back-to-game" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                    ↩️ 返回栖息地
                </button>
            </div>
            
            <!-- 统计信息 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
                <div class="bg-gray-800/50 rounded-lg p-3 text-center">
                    <div class="text-xs text-gray-400 mb-1">物种收集</div>
                    <div class="text-2xl font-bold text-teal-400" id="species-progress">0/0</div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-3 text-center">
                    <div class="text-xs text-gray-400 mb-1">稀有度收集</div>
                    <div class="text-2xl font-bold text-cyan-400" id="rarity-progress">0/0</div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-3 text-center">
                    <div class="text-xs text-gray-400 mb-1">技能收集</div>
                    <div class="text-2xl font-bold text-purple-400" id="skill-progress">0/0</div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-3 text-center">
                    <div class="text-xs text-gray-400 mb-1">最近解锁</div>
                    <div class="text-sm font-bold text-yellow-400" id="latest-unlock">暂无</div>
                </div>
            </div>
        </div>
        
        <!-- 标签页切换 -->
        <div class="bg-gray-900/80 backdrop-blur-lg rounded-xl mb-6 border border-gray-700 overflow-hidden">
            <div class="flex border-b border-gray-700">
                <button id="tab-rarity" class="tab-btn active flex-1 py-4 px-6 font-bold text-white bg-teal-600 transition-colors">
                    🌈 稀有度图鉴
                </button>
                <button id="tab-mutation" class="tab-btn flex-1 py-4 px-6 font-bold text-gray-400 hover:text-white hover:bg-gray-800 transition-colors">
                    🧬 变异图鉴
                </button>
                <button id="tab-skill" class="tab-btn flex-1 py-4 px-6 font-bold text-gray-400 hover:text-white hover:bg-gray-800 transition-colors">
                    ⚔️ 技能图鉴
                </button>
            </div>
        </div>
        
        <!-- 稀有度图鉴筛选栏 -->
        <div id="rarity-filters" class="bg-gray-900/80 backdrop-blur-lg rounded-xl p-4 mb-6 border border-gray-700">
            <div class="flex flex-wrap gap-2">
                <button class="encyclopedia-filter-btn active" data-filter="all">📚 全部</button>
                <button class="encyclopedia-filter-btn" data-filter="unlocked">✅ 已解锁</button>
                <button class="encyclopedia-filter-btn" data-filter="locked">🔒 未解锁</button>
                <div class="flex-1"></div>
                <button class="encyclopedia-filter-btn" data-element="water">💧 水系</button>
                <button class="encyclopedia-filter-btn" data-element="fire">🔥 火系</button>
                <button class="encyclopedia-filter-btn" data-element="grass">🌿 草系</button>
                <button class="encyclopedia-filter-btn" data-element="wind">💨 风系</button>
                <button class="encyclopedia-filter-btn" data-element="electric">⚡ 电系</button>
                <button class="encyclopedia-filter-btn" data-element="earth">🪨 土系</button>
            </div>
        </div>
        
        <!-- 变异图鉴筛选栏 -->
        <div id="mutation-filters" class="hidden bg-gray-900/80 backdrop-blur-lg rounded-xl p-4 mb-6 border border-gray-700">
            <div class="flex flex-wrap gap-2">
                <button class="mutation-filter-btn active" data-tier="all">📚 全部变异</button>
                <button class="mutation-filter-btn" data-tier="basic">🔹 基础级</button>
                <button class="mutation-filter-btn" data-tier="elite">💜 精英级</button>
                <button class="mutation-filter-btn" data-tier="legendary">✨ 传说级</button>
            </div>
        </div>
        
        <!-- 技能图鉴筛选栏 -->
        <div id="skill-filters" class="hidden bg-gray-900/80 backdrop-blur-lg rounded-xl p-4 mb-6 border border-gray-700">
            <div class="flex flex-wrap gap-2">
                <button class="encyclopedia-filter-btn active" data-filter="all">📚 全部技能池</button>
                <button class="encyclopedia-filter-btn" data-filter="unlocked">✅ 已完成</button>
                <button class="encyclopedia-filter-btn" data-filter="locked">⏳ 进行中</button>
            </div>
        </div>
        
        <!-- 图鉴网格 -->
        <div id="encyclopedia-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 图鉴卡片由JS生成 -->
        </div>
    </div>
    
    <!-- 图鉴详情模态框 -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 rounded-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto border-2 border-teal-500">
            <div class="sticky top-0 bg-gray-900 border-b border-gray-700 p-6 z-10">
                <div class="flex justify-between items-center">
                    <h3 id="detail-title" class="text-3xl font-bold text-teal-300">物种名称</h3>
                    <button id="btn-close-detail" class="text-3xl text-gray-500 hover:text-white">&times;</button>
                </div>
            </div>
            <div id="detail-content" class="p-6">
                <!-- 详情内容由JS生成 -->
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let gameState = {};
        let currentTab = 'rarity'; // 'rarity', 'mutation', 或 'skill'
        let currentFilter = { type: 'all', element: null, mutationTier: 'all', skillType: null, skillCategory: null };
        
        // 稀有度配置
        const RARITY_CONFIG = {
            common: { name: '普通', icon: '⚪', color: 'text-gray-400', bgClass: 'rarity-common' },
            shiny: { name: '闪光', icon: '✨', color: 'text-yellow-400', bgClass: 'rarity-shiny' },
            prismatic: { name: '幻彩', icon: '🌈', color: 'text-pink-400', bgClass: 'rarity-prismatic' },
            stellar: { name: '星芒', icon: '⭐', color: 'text-purple-400', bgClass: 'rarity-stellar' }
        };
        
        // 变异配置（仅一级变异）
        const MUTATION_CONFIG = {
            tier1: {
                basic: ['黑化', '白化', '晶化', '影化'],
                elite: ['暗蚀', '圣辉', '异能', '极电'],
                legendary: ['永夜', '永耀', '源晶', '雷煌']
            },
            icons: {
                '黑化': '🖤', '白化': '🤍', '晶化': '💎', '影化': '👤',
                '暗蚀': '🌑', '圣辉': '✨', '异能': '🔮', '极电': '⚡',
                '永夜': '🌙', '永耀': '☀️', '源晶': '💠', '雷煌': '⚡'
            }
        };
        
        // 元素配置
        const ELEMENT_CONFIG = {
            'water': { name: '水系', icon: '💧', bgClass: 'element-water' },
            'fire': { name: '火系', icon: '🔥', bgClass: 'element-fire' },
            'grass': { name: '草系', icon: '🌿', bgClass: 'element-grass' },
            'wind': { name: '风系', icon: '💨', bgClass: 'element-wind' },
            'electric': { name: '电系', icon: '⚡', bgClass: 'element-electric' },
            'earth': { name: '土系', icon: '🪨', bgClass: 'element-earth' },
            '水系': { name: '水系', icon: '💧', bgClass: 'element-water' },
            '火系': { name: '火系', icon: '🔥', bgClass: 'element-fire' },
            '草系': { name: '草系', icon: '🌿', bgClass: 'element-grass' },
            '风系': { name: '风系', icon: '💨', bgClass: 'element-wind' },
            '电系': { name: '电系', icon: '⚡', bgClass: 'element-electric' },
            '土系': { name: '土系', icon: '🪨', bgClass: 'element-earth' }
        };
        
        // 页面加载
        window.onload = function() {
            loadGameState();
            initializeSkillEncyclopediaFromAnimals(); // 初始化技能图鉴
            setupEventListeners();
            renderEncyclopedia();
        };
        
        // 新增：从动物数据初始化技能图鉴
        function initializeSkillEncyclopediaFromAnimals() {
            console.log('[图鉴初始化] 开始从动物扫描技能...');
            
            if (!gameState.animals || gameState.animals.length === 0) {
                console.log('[图鉴初始化] 没有动物数据');
                return;
            }
            
            const skillLibrary = JSON.parse(localStorage.getItem('SKILL_POOL') || '[]');
            let unlockedCount = 0;
            
            if (!gameState.unlockedSkills) {
                gameState.unlockedSkills = {};
            }
            
            gameState.animals.forEach(animal => {
                console.log(`[图鉴初始化] 扫描动物: ${animal.name}`);
                
                // 扫描战斗技能
                if (animal.combatSkills && animal.combatSkills.available) {
                    console.log(`[图鉴初始化] ${animal.name} 可用战斗技能:`, animal.combatSkills.available);
                    animal.combatSkills.available.forEach(skillKey => {
                        if (!gameState.unlockedSkills[skillKey]) {
                            const skill = skillLibrary.find(s => s.key === skillKey);
                            if (skill) {
                                gameState.unlockedSkills[skillKey] = {
                                    unlockedAt: Date.now(),
                                    name: skill.name,
                                    icon: skill.icon
                                };
                                unlockedCount++;
                                console.log(`[图鉴初始化] 解锁技能: ${skill.name}`);
                            }
                        }
                    });
                }
                
                // 扫描变异技能
                if (animal.mutations && animal.mutations.skills) {
                    console.log(`[图鉴初始化] ${animal.name} 变异技能:`, animal.mutations.skills);
                    animal.mutations.skills.forEach(skillKey => {
                        if (!gameState.unlockedSkills[skillKey]) {
                            const skill = skillLibrary.find(s => s.key === skillKey);
                            if (skill) {
                                gameState.unlockedSkills[skillKey] = {
                                    unlockedAt: Date.now(),
                                    name: skill.name,
                                    icon: skill.icon
                                };
                                unlockedCount++;
                                console.log(`[图鉴初始化] 解锁变异技能: ${skill.name}`);
                            }
                        }
                    });
                }
            });
            
            if (unlockedCount > 0) {
                console.log(`[图鉴初始化] 批量解锁了 ${unlockedCount} 个技能，准备保存`);
                saveGameState();
            }
            
            console.log('[图鉴初始化] 完成！当前已解锁:', Object.keys(gameState.unlockedSkills).length);
        }
        
        // 加载游戏状态
        function loadGameState() {
            const stateJSON = localStorage.getItem('gameState');
            if (stateJSON) {
                gameState = JSON.parse(stateJSON);
                console.log('[图鉴加载] 加载gameState成功');
                console.log('[图鉴加载] gameState.unlockedSkills:', gameState.unlockedSkills);
                
                // 确保图鉴数据结构存在
                if (!gameState.unlockedEncyclopedia) {
                    gameState.unlockedEncyclopedia = {};
                }
                if (!gameState.unlockedSkills) {
                    gameState.unlockedSkills = {};
                    console.log('[图鉴加载] 初始化unlockedSkills为空对象');
                } else {
                    console.log('[图鉴加载] unlockedSkills已存在，key数量:', Object.keys(gameState.unlockedSkills).length);
                }
            } else {
                alert("游戏状态加载失败！将返回栖息地。");
                window.location.href = '../pages/game3d.html';
            }
        }
        
        // 保存游戏状态
        function saveGameState() {
            const stateToSave = JSON.parse(JSON.stringify(gameState, (key, value) => {
                if (key === 'avatarData') return undefined;
                return value;
            }));
            localStorage.setItem('gameState', JSON.stringify(stateToSave));
        }
        
        // 返回游戏
        function backToGame() {
            saveGameState();
            window.location.href = '../pages/game3d.html';
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            document.getElementById('btn-back-to-game').addEventListener('click', backToGame);
            document.getElementById('btn-close-detail').addEventListener('click', closeDetailModal);
            
            // 标签页切换
            document.getElementById('tab-rarity').addEventListener('click', () => switchTab('rarity'));
            document.getElementById('tab-mutation').addEventListener('click', () => switchTab('mutation'));
            document.getElementById('tab-skill').addEventListener('click', () => switchTab('skill'));
            
            // 稀有度图鉴筛选按钮
            document.querySelectorAll('.encyclopedia-filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.dataset.filter) {
                        // 状态筛选
                        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentFilter.type = this.dataset.filter;
                        currentFilter.element = null;
                        document.querySelectorAll('[data-element]').forEach(b => b.classList.remove('active'));
                    } else if (this.dataset.element) {
                        // 元素筛选
                        if (this.classList.contains('active')) {
                            this.classList.remove('active');
                            currentFilter.element = null;
                        } else {
                            document.querySelectorAll('[data-element]').forEach(b => b.classList.remove('active'));
                            this.classList.add('active');
                            currentFilter.element = this.dataset.element;
                        }
                    }
                    renderEncyclopedia();
                });
            });
            
            // 变异图鉴筛选按钮
            document.querySelectorAll('.mutation-filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.mutation-filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter.mutationTier = this.dataset.tier;
                    renderMutationEncyclopedia();
                });
            });
            
            // 技能图鉴筛选按钮（简化版）
            document.querySelectorAll('#skill-filters .encyclopedia-filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#skill-filters [data-filter]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter.type = this.dataset.filter;
                    renderSkillEncyclopedia();
                });
            });
        }
        
        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;
            
            // 更新标签按钮样式
            const rarityTab = document.getElementById('tab-rarity');
            const mutationTab = document.getElementById('tab-mutation');
            const skillTab = document.getElementById('tab-skill');
            
            // 重置所有标签
            [rarityTab, mutationTab, skillTab].forEach(t => {
                t.classList.remove('active', 'bg-teal-600', 'text-white');
                t.classList.add('text-gray-400', 'hover:bg-gray-800');
            });
            
            // 隐藏所有筛选栏
            document.getElementById('rarity-filters').classList.add('hidden');
            document.getElementById('mutation-filters').classList.add('hidden');
            document.getElementById('skill-filters').classList.add('hidden');
            
            if (tab === 'rarity') {
                rarityTab.classList.add('active', 'bg-teal-600', 'text-white');
                rarityTab.classList.remove('text-gray-400', 'hover:bg-gray-800');
                document.getElementById('rarity-filters').classList.remove('hidden');
                renderEncyclopedia();
            } else if (tab === 'mutation') {
                mutationTab.classList.add('active', 'bg-teal-600', 'text-white');
                mutationTab.classList.remove('text-gray-400', 'hover:bg-gray-800');
                document.getElementById('mutation-filters').classList.remove('hidden');
                renderMutationEncyclopedia();
            } else if (tab === 'skill') {
                skillTab.classList.add('active', 'bg-teal-600', 'text-white');
                skillTab.classList.remove('text-gray-400', 'hover:bg-gray-800');
                document.getElementById('skill-filters').classList.remove('hidden');
                renderSkillEncyclopedia();
            }
        }
        
        // 获取图鉴条目（从动物模板池）
        function getEncyclopediaEntries() {
            const animalPool = JSON.parse(localStorage.getItem('ANIMAL_POOL') || '[]');
            const entries = {};
            
            animalPool.forEach(template => {
                const animalId = template.animalId;
                if (!animalId) return;
                
                // 提取基础ID（物种ID，去掉稀有度前缀）
                const baseId = animalId.substring(1); // 例如 '0001'
                const rarityPrefix = animalId.charAt(0); // '1', '2', '3', '4'
                
                // 映射稀有度前缀到稀有度名称
                const rarityMap = { '1': 'common', '2': 'shiny', '3': 'prismatic', '4': 'stellar' };
                const rarity = rarityMap[rarityPrefix] || 'common';
                
                if (!entries[baseId]) {
                    entries[baseId] = {
                        baseId: baseId,
                        species: template.name.replace(/^(普通|闪光|幻彩|星芒)/, '').trim(), // 移除稀有度前缀
                        element: template.element,
                        variants: {}
                    };
                }
                
                // 添加稀有度变体
                entries[baseId].variants[rarity] = {
                    animalId: animalId,
                    templateKey: template.key,
                    rarity: rarity,
                    name: template.name,
                    color: template.color,
                    modelShape: template.modelShape || 'sphere',
                    avatarData: template.avatarData,
                    desc: template.desc || '',
                    stats: {
                        level: template.level || 1,
                        health: template.health || 100,
                        stamina: template.stamina || 100,
                        attack: template.attack || 10,
                        defense: template.defense || 5,
                        agility: template.agility || 8,
                        baseExp: template.baseExp || 100,
                        expGrowth: template.expGrowth || 1.2
                    },
                    skills: template.skills || [],
                    growthTypes: template.growthTypes || null
                };
            });
            
            return entries;
        }
        
        // 渲染图鉴
        function renderEncyclopedia() {
            const grid = document.getElementById('encyclopedia-grid');
            grid.innerHTML = '';
            
            const entries = getEncyclopediaEntries();
            const unlockedData = gameState.unlockedEncyclopedia || {};
            
            // 统计进度
            let totalSpecies = 0;
            let unlockedSpecies = 0;
            let totalVariants = 0;
            let unlockedVariants = 0;
            let latestUnlock = null;
            let latestUnlockTime = 0;
            
            // 收集所有物种和变体
            const speciesList = Object.values(entries);
            
            speciesList.forEach(species => {
                // 元素筛选
                if (currentFilter.element) {
                    const elementKey = currentFilter.element;
                    const elementName = ELEMENT_CONFIG[elementKey]?.name;
                    if (species.element !== elementKey && species.element !== elementName) {
                        return; // 跳过不匹配的元素
                    }
                }
                
                totalSpecies++;
                const variantCount = Object.keys(species.variants).length;
                totalVariants += variantCount;
                
                // 检查该物种是否至少解锁了一个变体
                const unlockedVariantsList = Object.values(species.variants).filter(v => unlockedData[v.animalId]);
                const hasUnlocked = unlockedVariantsList.length > 0;
                
                if (hasUnlocked) unlockedSpecies++;
                unlockedVariants += unlockedVariantsList.length;
                
                // 查找最近解锁
                unlockedVariantsList.forEach(variant => {
                    const unlockInfo = unlockedData[variant.animalId];
                    if (unlockInfo && unlockInfo.unlockedAt > latestUnlockTime) {
                        latestUnlockTime = unlockInfo.unlockedAt;
                        latestUnlock = variant.name;
                    }
                });
                
                // 状态筛选
                if (currentFilter.type === 'unlocked' && !hasUnlocked) return;
                if (currentFilter.type === 'locked' && hasUnlocked) return;
                
                // 创建卡片
                renderSpeciesCard(species, hasUnlocked, unlockedVariantsList, grid);
            });
            
            // 更新统计
            document.getElementById('species-progress').textContent = `${unlockedSpecies}/${totalSpecies}`;
            document.getElementById('rarity-progress').textContent = `${unlockedVariants}/${totalVariants}`;
            document.getElementById('latest-unlock').textContent = latestUnlock || '暂无';
            
            if (speciesList.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12 text-lg">动物模板池为空<br><span class="text-sm mt-2 block">请先在动物设计器中创建模板</span></div>';
            } else if (totalSpecies === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12 text-lg">没有符合筛选条件的物种</div>';
            }
        }
        
        // 渲染物种卡片
        function renderSpeciesCard(species, hasUnlocked, unlockedVariants, container) {
            const card = document.createElement('div');
            card.className = `species-card p-5 rounded-xl border transition-all ${
                hasUnlocked 
                    ? 'bg-gradient-to-br from-gray-800 to-gray-900 border-teal-500 shadow-xl hover:shadow-teal-500/50 cursor-pointer' 
                    : 'bg-gray-900/50 border-gray-700 opacity-60'
            }`;
            
            // 获取显示用的变体（优先显示已解锁的最高稀有度）
            let displayVariant = null;
            if (hasUnlocked) {
                const rarityOrder = ['stellar', 'prismatic', 'shiny', 'common'];
                for (const rarity of rarityOrder) {
                    const variant = unlockedVariants.find(v => v.rarity === rarity);
                    if (variant) {
                        displayVariant = variant;
                        break;
                    }
                }
            }
            if (!displayVariant) {
                displayVariant = Object.values(species.variants)[0];
            }
            
            // 元素图标和名称
            const elementConfig = ELEMENT_CONFIG[species.element] || ELEMENT_CONFIG[species.element] || { icon: '❔', name: '未知', bgClass: 'bg-gray-700' };
            
            // 头像
            let avatarHtml = '<div class="w-24 h-24 rounded-full mx-auto mb-3 flex items-center justify-center text-5xl grayscale blur-sm bg-gray-800 border-2 border-gray-600">❓</div>';

                // 使用图像库获取头像
                let avatarUrl = null;
                if (typeof imageLibrary !== 'undefined') {
                    avatarUrl = imageLibrary.getAnimalAvatar(displayVariant);
                }
                if (!avatarUrl && displayVariant.avatarData) {
                    avatarUrl = displayVariant.avatarData;
                }
                
                if (avatarUrl) {
                    avatarHtml = `<img src="${avatarUrl}" class="w-24 h-24 rounded-full mx-auto mb-3 border-3 border-teal-400 object-cover shadow-lg" alt="${species.species}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'w-24 h-24 rounded-full mx-auto mb-3 border-3 border-teal-400 shadow-lg\\' style=\\'background-color: ${displayVariant.color}\\'></div>';">`;

            // 稀有度进度条

            const rarityBadges = rarityOrder.map(rarity => {

                if (!variant) return '';

                const config = RARITY_CONFIG[rarity];
                return `<span class="text-xl ${isUnlocked ? config.color : 'text-gray-700'}" title="${config.name}">${config.icon}</span>`;

            grid.innerHTML = '';
            
            const entries = getEncyclopediaEntries();
            const unlockedData = gameState.unlockedEncyclopedia || {};
            
            // 获取筛选的变异类型
            const mutationTier = currentFilter.mutationTier;
            let mutationsToShow = [];
            
            if (mutationTier === 'all') {

                    ...MUTATION_CONFIG.tier1.basic,

                    ...MUTATION_CONFIG.tier1.legendary

                mutationsToShow = MUTATION_CONFIG.tier1.basic;

                                            </div>
                                            <div class="bg-gray-900/50 rounded px-2 py-1 text-center">
                                                <div class="text-gray-400">🛡️</div>
                                                <div class="text-blue-300 font-bold">${variant.stats.defense}</div>
                                            </div>
                                            <div class="bg-gray-900/50 rounded px-2 py-1 text-center">
                                                <div class="text-gray-400">💨</div>
                                                <div class="text-yellow-300 font-bold">${variant.stats.agility}</div>
                                            </div>
                                        </div>
                                        
                                        <!-- 解锁时间 -->
                                        <div class="text-xs text-gray-500">
                                            🕐 解锁于: ${new Date(unlockInfo.unlockedAt).toLocaleString('zh-CN')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            });
            
            content.innerHTML = html;
            modal.classList.remove('hidden');
        }
        
        // 渲染技能图鉴（按动物技能池分组）
        function renderSkillEncyclopedia() {
            const grid = document.getElementById('encyclopedia-grid');
            grid.innerHTML = '';
            
            const skillLibrary = JSON.parse(localStorage.getItem('SKILL_POOL') || '[]');
            const skillPools = JSON.parse(localStorage.getItem('SKILL_POOLS') || '[]');
            const animalPool = JSON.parse(localStorage.getItem('ANIMAL_POOL') || '[]');
            const unlockedSkills = gameState.unlockedSkills || {};
            
            console.log('[技能图鉴渲染] gameState.unlockedSkills:', unlockedSkills);
            console.log('[技能图鉴渲染] 已解锁技能key:', Object.keys(unlockedSkills));
            
            // 统计
            let totalSkills = skillLibrary.length;
            let unlockedCount = Object.keys(unlockedSkills).length;
            
            console.log('[技能图鉴渲染] 总技能数:', totalSkills, '已解锁:', unlockedCount);
            
            // 更新统计显示
            document.getElementById('skill-progress').textContent = `${unlockedCount}/${totalSkills}`;
            
            if (skillLibrary.length === 0 || skillPools.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12 text-lg">技能池为空<br><span class="text-sm mt-2 block">请先在技能设计器中创建技能</span></div>';
                return;
            }
            
            // 按技能池分组
            skillPools.forEach(pool => {
                renderSkillPoolCard(pool, skillLibrary, animalPool, unlockedSkills, grid);
            });
        }
        
        // 渲染单个技能池卡片（按动物稀有度组织）
        function renderSkillPoolCard(pool, skillLibrary, animalPool, unlockedSkills, container) {
            // 查找关联的动物，并按稀有度分组
            const animalsByRarity = { common: [], shiny: [], prismatic: [], stellar: [] };
            
            animalPool.forEach(animal => {
                if (animal.skillPoolKey !== pool.key) return;
                
                // 从animalId提取稀有度
                const animalId = animal.animalId;
                if (!animalId) return;
                
                const rarityPrefix = animalId.charAt(0);
                const rarityMap = { '1': 'common', '2': 'shiny', '3': 'prismatic', '4': 'stellar' };
                const animalRarity = rarityMap[rarityPrefix] || 'common';
                
                animalsByRarity[animalRarity].push(animal);
            });
            
            // 检查是否有关联的动物
            const totalAnimals = Object.values(animalsByRarity).flat().length;
            if (totalAnimals === 0) return;
            
            // 统计总体收集进度
            const poolSkills = pool.skills || [];
            const totalSkills = poolSkills.length;
            const unlockedCount = poolSkills.filter(sc => unlockedSkills[sc.skillKey]).length;
            const completionPercent = totalSkills > 0 ? Math.round((unlockedCount / totalSkills) * 100) : 0;
            
            // 应用筛选
            if (currentFilter.type === 'unlocked' && unlockedCount < totalSkills) return;
            if (currentFilter.type === 'locked' && unlockedCount === totalSkills) return;
            
            const card = document.createElement('div');
            card.className = 'species-card p-5 rounded-xl border transition-all cursor-pointer bg-gradient-to-br from-gray-800 to-gray-900 border-purple-500 shadow-xl hover:shadow-purple-500/50';
            
            // 稀有度图标（表示有哪些稀有度的动物）
            const animalRarityIcons = {
                common: '⚪', shiny: '✨', prismatic: '🌈', stellar: '⭐'
            };
            const animalRarityBadges = ['stellar', 'prismatic', 'shiny', 'common'].map(rarity => {
                const count = animalsByRarity[rarity].length;
                if (count === 0) return '';
                return `<span class="text-xl">${animalRarityIcons[rarity]}</span>`;
            }).join(' ');
            
            card.innerHTML = `
                <div class="text-center">
                    <div class="text-6xl mb-3">${pool.icon || '📚'}</div>
                    <h3 class="text-xl font-bold text-white mb-2">${pool.name}</h3>
                    
                    <div class="mb-3">
                        <div class="text-3xl font-bold ${completionPercent === 100 ? 'text-green-400' : 'text-purple-400'} mb-1">${completionPercent}%</div>
                        <div class="text-xs text-gray-400">${unlockedCount}/${totalSkills} 技能已解锁</div>
                    </div>
                    
                    <div class="flex gap-1 justify-center mb-3">
                        ${animalRarityBadges}
                    </div>
                    
                    <div class="text-xs text-gray-400">${totalAnimals}个动物使用此技能池</div>
                    <div class="text-xs text-purple-400 mt-2">点击查看详情</div>
                </div>
            `;
            
            card.onclick = () => openSkillPoolDetailModal(pool, skillLibrary, animalPool, animalsByRarity, unlockedSkills);
            container.appendChild(card);
        }
        
        // 打开技能池详情模态框（按动物稀有度分组）
        function openSkillPoolDetailModal(pool, skillLibrary, animalPool, animalsByRarity, unlockedSkills) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');
            
            document.getElementById('detail-title').innerHTML = `${pool.icon || '📚'} ${pool.name}`;
            
            const poolSkills = pool.skills || [];
            
            // 统计总体进度
            const totalSkills = poolSkills.length;
            const unlockedCount = poolSkills.filter(sc => unlockedSkills[sc.skillKey]).length;
            const completionPercent = totalSkills > 0 ? Math.round((unlockedCount / totalSkills) * 100) : 0;
            
            // 动物稀有度配置
            const animalRarityConfig = {
                'stellar': { label: '星芒', icon: '⭐', color: 'text-purple-400' },
                'prismatic': { label: '幻彩', icon: '🌈', color: 'text-pink-400' },
                'shiny': { label: '闪光', icon: '✨', color: 'text-yellow-400' },
                'common': { label: '普通', icon: '⚪', color: 'text-gray-400' }
            };
            
            let html = `
                <!-- 技能池概览 -->
                <div class="mb-4 bg-gray-800/50 rounded-lg p-4 text-center">
                    <div class="flex items-center gap-3 justify-center">
                        <span class="text-4xl">${pool.icon || '📚'}</span>
                        <div>
                            <h4 class="text-2xl font-bold text-white">${pool.name}</h4>
                            <div class="text-sm text-gray-400">总收集进度: <span class="text-purple-400 font-bold">${completionPercent}%</span></div>
                        </div>
                    </div>
                </div>
                
                <!-- 左右分栏布局 -->
                <div class="grid grid-cols-12 gap-4">
                    <!-- 左侧：动物稀有度选择器 -->
                    <div class="col-span-3 space-y-2">
                        <h5 class="text-sm font-bold text-gray-400 mb-3">动物稀有度</h5>
            `;
            
            // 生成动物稀有度按钮
            ['stellar', 'prismatic', 'shiny', 'common'].forEach((animalRarity, index) => {
                const config = animalRarityConfig[animalRarity];
                const animals = animalsByRarity[animalRarity] || [];
                
                if (animals.length === 0) return; // 该稀有度没有动物，跳过
                
                html += `
                    <button
                        onclick="switchAnimalRarity('${animalRarity}')"
                        id="animal-rarity-btn-${animalRarity}"
                        class="w-full text-left p-3 rounded-lg border-2 transition-all ${index === 3 ? 'border-purple-500 bg-gradient-to-r from-purple-600 to-pink-600' : 'border-gray-600 bg-gray-800/50 hover:border-gray-500'}"
                    >
                        <div class="flex items-center justify-between mb-1">
                            <div class="flex items-center gap-2">
                                <span class="text-xl">${config.icon}</span>
                                <span class="text-sm font-bold text-white">${config.label}</span>
                            </div>
                        </div>
                        <div class="text-xs text-gray-300">${animals.length}个动物</div>
                    </button>
                `;
            });
            
            html += `
                    </div>
                    
                    <!-- 右侧：技能网格 -->
                    <div class="col-span-9" id="animal-skill-grid-container">
                        <!-- 技能网格由switchAnimalRarity动态生成 -->
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
            modal.classList.remove('hidden');
            
            // 保存数据到window
            window.currentPoolData = {
                pool: pool,
                skillLibrary: skillLibrary,
                animalsByRarity: animalsByRarity,
                poolSkills: poolSkills,
                unlockedSkills: unlockedSkills,
                animalRarityConfig: animalRarityConfig,
                skillRarityStyles: {
                    'common': { bg: 'bg-gray-700', border: 'border-gray-500', badge: 'bg-gray-600 text-gray-300', label: '普通' },
                    'rare': { bg: 'bg-blue-700', border: 'border-blue-400', badge: 'bg-blue-500 text-blue-100', label: '稀有' },
                    'epic': { bg: 'bg-purple-700', border: 'border-purple-400', badge: 'bg-purple-500 text-purple-100', label: '史诗' },
                    'legendary': { bg: 'bg-gradient-to-br from-orange-600 to-yellow-600', border: 'border-yellow-400', badge: 'bg-gradient-to-r from-orange-500 to-yellow-500 text-white', label: '传说' }
                }
            };
            
            // 默认显示普通动物稀有度
            switchAnimalRarity('common');
        }
        
        // 切换动物稀有度显示
        function switchAnimalRarity(animalRarity) {
            if (!window.currentPoolData) return;
            
            const { animalsByRarity, poolSkills, skillLibrary, unlockedSkills, animalRarityConfig, skillRarityStyles } = window.currentPoolData;
            const gridContainer = document.getElementById('animal-skill-grid-container');
            const animals = animalsByRarity[animalRarity] || [];
            
            // 更新按钮状态
            ['stellar', 'prismatic', 'shiny', 'common'].forEach(r => {
                const btn = document.getElementById(`animal-rarity-btn-${r}`);
                if (btn) {
                    if (r === animalRarity) {
                        btn.className = 'w-full text-left p-3 rounded-lg border-2 transition-all border-purple-500 bg-gradient-to-r from-purple-600 to-pink-600';
                    } else {
                        btn.className = 'w-full text-left p-3 rounded-lg border-2 transition-all border-gray-600 bg-gray-800/50 hover:border-gray-500';
                    }
                }
            });
            
            if (animals.length === 0) {
                gridContainer.innerHTML = '<div class="text-center text-gray-500 py-12">该稀有度没有动物使用此技能池</div>';
                return;
            }
            
            const config = animalRarityConfig[animalRarity];
            
            let html = `
                <div class="bg-gray-800/30 rounded-lg p-4 border border-gray-700">
                    <div class="flex items-center justify-between mb-4">
                        <h6 class="font-bold text-xl flex items-center gap-2">
                            <span class="text-2xl">${config.icon}</span>
                            <span class="${config.color}">${config.label}动物</span>
                        </h6>
                    </div>
                    
                    <!-- 动物列表 -->
                    <div class="mb-4 pb-4 border-b border-gray-700 flex flex-wrap gap-2">
                        ${animals.map(a => `
                            <span class="text-sm bg-teal-600/30 text-teal-200 px-3 py-1 rounded">${a.name}</span>
                        `).join('')}
                    </div>
                    
                    <h6 class="text-sm font-bold text-purple-300 mb-3">技能池内容（按稀有度分组）</h6>
            `;
            
            // 按技能稀有度分组并渲染
            const skillsByRarity = { legendary: [], epic: [], rare: [], common: [] };
            poolSkills.forEach(skillConfig => {
                const skillRarity = skillConfig.rarity || 'common';
                if (skillsByRarity[skillRarity]) {
                    skillsByRarity[skillRarity].push(skillConfig);
                }
            });
            
            // 按顺序渲染四个稀有度（传说→史诗→稀有→普通）
            ['legendary', 'epic', 'rare', 'common'].forEach(skillRarity => {
                const skills = skillsByRarity[skillRarity];
                if (!skills || skills.length === 0) return;
                
                const style = skillRarityStyles[skillRarity];
                const unlockedInRarity = skills.filter(sc => unlockedSkills[sc.skillKey]).length;
                
                html += `
                    <div class="mb-4 p-3 rounded-lg bg-gray-900/50 border border-gray-700">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="px-2 py-1 rounded ${style.badge} text-xs font-semibold">${style.label}</span>
                            <span class="text-xs text-gray-400">${unlockedInRarity}/${skills.length} 已解锁</span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                `;
                
                skills.forEach(skillConfig => {
                    const skill = skillLibrary.find(s => s.key === skillConfig.skillKey);
                    if (!skill) return;
                    
                    const isUnlocked = unlockedSkills[skill.key];
                    
                    html += `
                        <div class="relative ${style.bg} hover:brightness-110 rounded-lg p-2 text-center border-2 ${style.border} transition-all ${isUnlocked ? '' : 'opacity-40 grayscale'}">
                            ${isUnlocked ? '<div class="absolute top-0.5 right-0.5 text-green-400 text-xs">✅</div>' : '<div class="absolute top-0.5 right-0.5 text-gray-600 text-xs">🔒</div>'}
                            <div class="text-3xl mb-1 ${isUnlocked ? '' : 'blur-sm'}">${isUnlocked ? skill.icon : '❓'}</div>
                            <div class="text-xs font-bold text-white leading-tight ${isUnlocked ? '' : 'blur-sm'}">${isUnlocked ? skill.name : '未解锁'}</div>
                            ${skillConfig.unlockLevel > 1 ? `<div class="text-xs text-gray-300 mt-0.5">Lv.${skillConfig.unlockLevel}</div>` : ''}
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            });
            
            html += `</div>`;
            gridContainer.innerHTML = html;
        }
        
        // 打开技能详情模态框（增强版 - 显示在哪些动物技能池中）
        function openSkillDetailModal(skill) {
            const skillPools = JSON.parse(localStorage.getItem('SKILL_POOLS') || '[]');
            const animalPool = JSON.parse(localStorage.getItem('ANIMAL_POOL') || '[]');
            
            // 查找包含该技能的所有技能池
            const relatedPools = skillPools.filter(pool => {
                return pool.skills && pool.skills.some(s => s.skillKey === skill.key);
            });
            
            // 查找使用这些技能池的动物
            const relatedAnimals = [];
            relatedPools.forEach(pool => {
                const animals = animalPool.filter(a => a.skillPoolKey === pool.key);
                animals.forEach(animal => {
                    const skillConfig = pool.skills.find(s => s.skillKey === skill.key);
                    if (skillConfig && !relatedAnimals.some(r => r.animalId === animal.animalId)) {
                        relatedAnimals.push({
                            name: animal.name,
                            animalId: animal.animalId,
                            poolName: pool.name,
                            unlockLevel: skillConfig.unlockLevel || 1,
                            rarity: skillConfig.rarity || 'common'
                        });
                    }
                });
            });
            
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');
            const unlockedSkills = gameState.unlockedSkills || {};
            
            document.getElementById('detail-title').innerHTML = `${skill.icon} ${skill.name}`;
            
            const categoryNames = {
                'element-water': '💧 水系', 'element-fire': '🔥 火系', 'element-grass': '🌿 草系',
                'element-wind': '💨 风系', 'element-metal': '🪙 金系', 'element-earth': '🪨 土系',
                'mutation-dark': '🖤 黑化', 'mutation-light': '🤍 白化', 'mutation-crystal': '💎 晶化',
                'mutation-shadow': '👤 影化', 'mutation-chaos': '🌑 暗蚀', 'mutation-holy': '✨ 圣辉',
                'mutation-psychic': '🔮 异能', 'mutation-thunder': '⚡ 极电',
                'mutation-eternal-dark': '🌙 永夜', 'mutation-eternal-light': '☀️ 永耀',
                'mutation-source-crystal': '💠 源晶', 'mutation-thunder-lord': '⚡ 雷煌'
            };
            
            const typeNames = {
                'attack': '⚔️ 攻击型',
                'defense': '🛡️ 防御型',
                'agility': '⚡ 敏捷型',
                'buff': '💪 增益型',
                'debuff': '🔻 减益型',
                'heal': '💚 治疗型'
            };
            
            const effectNames = {
                'direct_attack': '直接攻击', 'multi_attack': '多段攻击',
                'dot_damage': '附加伤害', 'percent_damage': '百分比伤害',
                'direct_defense': '直接防御', 'continuous_defense': '持续防御',
                'defense_counter': '防御反击', 'direct_speed': '直接增速',
                'continuous_speed': '持续增速', 'buff_attack': '增攻',
                'buff_defense': '增防', 'buff_speed': '增速',
                'buff_status_enemy': '为敌方附加异常', 'buff_purify': '净化',
                'buff_heal_amp': '增加治疗量', 'buff_element_damage': '属性增伤',
                'debuff_attack': '减攻', 'debuff_defense': '减防',
                'debuff_speed': '减速', 'debuff_status_self': '为自身附加异常',
                'debuff_no_heal': '禁疗', 'debuff_heal_reduce': '减疗',
                'debuff_element_damage': '属性减伤', 'debuff_hp_cost': '扣血',
                'heal_direct': '直接恢复', 'heal_continuous': '持续恢复',
                'heal_percent': '百分比恢复', 'heal_rebirth': '重生',
                'heal_lifesteal': '生命汲取'
            };
            
            let html = `
                <div class="mb-6">
                    <div class="flex items-center justify-center gap-4 mb-4">
                        <div class="text-8xl">${skill.icon}</div>
                        <div class="text-left">
                            <h4 class="text-3xl font-bold text-white mb-2">${skill.name}</h4>
                            <div class="flex gap-2">
                                <span class="text-sm bg-gradient-to-r from-purple-600 to-pink-600 px-3 py-1 rounded-full text-white font-bold">
                                    ${categoryNames[skill.category] || skill.category}
                                </span>
                                <span class="text-sm bg-gray-700 px-3 py-1 rounded-full text-gray-300">
                                    ${typeNames[skill.type] || skill.type}
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    ${skill.description ? `
                        <div class="bg-gray-800/50 rounded-lg p-4 mb-4">
                            <p class="text-gray-300 italic text-center">"${skill.description}"</p>
                        </div>
                    ` : ''}
                </div>
                
                <!-- 关联动物信息 -->
                ${relatedAnimals.length > 0 ? `
                    <div class="mb-6">
                        <h5 class="text-lg font-bold text-cyan-300 mb-3 flex items-center gap-2">
                            <span>🐾</span>
                            <span>可在以下动物中获得</span>
                        </h5>
                        <div class="grid grid-cols-2 gap-2">
                            ${relatedAnimals.map(a => `
                                <div class="bg-teal-900/20 border border-teal-600/30 rounded-lg p-2 text-left">
                                    <div class="text-sm text-white font-bold">${a.name}</div>
                                    <div class="text-xs text-gray-400">Lv.${a.unlockLevel}解锁 · ${a.rarity === 'legendary' ? '传说' : a.rarity === 'epic' ? '史诗' : a.rarity === 'rare' ? '稀有' : '普通'}</div>
                                    <div class="text-xs text-teal-400 mt-1">${a.poolName}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                
                <!-- 技能效果 -->
                <div class="mb-6">
                    <h5 class="text-lg font-bold text-purple-300 mb-3 flex items-center gap-2">
                        <span>✨</span>
                        <span>技能效果</span>
                    </h5>
                    <div class="grid grid-cols-1 gap-2">
                        ${(skill.effects || []).map(e => `
                            <div class="bg-gray-800/50 rounded-lg p-3 border border-green-600/30">
                                <span class="text-green-300 font-bold">${effectNames[e] || e}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <!-- 技能参数 -->
                ${skill.params ? `
                    <div class="mb-6">
                        <h5 class="text-lg font-bold text-cyan-300 mb-3 flex items-center gap-2">
                            <span>⚙️</span>
                            <span>技能参数</span>
                        </h5>
                        <div class="grid grid-cols-3 gap-3">
                            ${skill.params.cooldown > 0 ? `
                                <div class="bg-blue-900/30 rounded-lg p-3 text-center border border-blue-600/30">
                                    <div class="text-xs text-gray-400 mb-1">冷却回合</div>
                                    <div class="text-2xl font-bold text-blue-300">${skill.params.cooldown}</div>
                                </div>
                            ` : ''}
                            ${skill.params.duration > 0 ? `
                                <div class="bg-purple-900/30 rounded-lg p-3 text-center border border-purple-600/30">
                                    <div class="text-xs text-gray-400 mb-1">持续回合</div>
                                    <div class="text-2xl font-bold text-purple-300">${skill.params.duration}</div>
                                </div>
                            ` : ''}
                            ${skill.params.count > 1 ? `
                                <div class="bg-yellow-900/30 rounded-lg p-3 text-center border border-yellow-600/30">
                                    <div class="text-xs text-gray-400 mb-1">每回合次数</div>
                                    <div class="text-2xl font-bold text-yellow-300">${skill.params.count}</div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                ` : ''}
                
                <!-- 解锁信息 -->
                ${unlockedSkills[skill.key] ? `
                    <div class="bg-teal-900/20 rounded-lg p-4 border border-teal-600/30">
                        <div class="text-sm text-teal-300 text-center">
                            ✅ 已解锁<br>
                            <span class="text-xs text-gray-400">
                                ${new Date(unlockedSkills[skill.key].unlockedAt).toLocaleString('zh-CN')}
                            </span>
                        </div>
                    </div>
                ` : ''}
            `;
            
            content.innerHTML = html;
            modal.classList.remove('hidden');
        }
        
        // 关闭详情模态框
        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
