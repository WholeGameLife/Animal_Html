<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子盆栽 - 世界地图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1e3a8a 0%, #4c1d95 100%); color: #f1f5f9; }
        .world-card {
            background-size: cover;
            background-position: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid transparent;
        }
        .world-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            border-color: #facc15;
        }
        .world-card .overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold text-yellow-300 tracking-wider">世界地图</h1>
            <div class="flex gap-2">
                <button id="btn-toggle-debug" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition-transform hover:scale-105">
                    🐞 调试器
                </button>
                <button id="btn-return-habitat" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition-transform hover:scale-105">返回栖息地</button>
            </div>
        </div>

        <p class="text-center text-lg text-gray-300 mb-10">选择一个区域进行探索。不同的区域栖息着不同系别的野生动物。</p>

        <!-- 自定义地图区域 -->
        <div id="custom-maps-section" class="mb-8" style="display: block;">
            <h2 class="text-2xl font-bold text-yellow-300 mb-4">🗺️ 探索地图 (<span id="custom-map-count">0</span>)</h2>
            <div id="custom-maps-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="text-center text-gray-400 col-span-3 py-8">
                    <p class="mb-2">暂无可探索的地图</p>
                    <p class="text-sm">在地图配置器中创建地图后会显示在这里</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/debug.js"></script>
    <script>
        // 初始化
        window.onload = () => {
            renderCustomMaps();
            setupEventListeners();
        };

        // 设置事件监听器
        function setupEventListeners() {
            document.getElementById('btn-return-habitat').addEventListener('click', () => {
                window.location.href = '../pages/game3d.html';
            });
            
            // 调试按钮
            const debugBtn = document.getElementById('btn-toggle-debug');
            if (debugBtn) {
                debugBtn.addEventListener('click', () => {
                    const debugPanel = document.getElementById('debug-panel');
                    if (debugPanel) {
                        debugPanel.classList.toggle('hidden');
                    }
                });
            }
        }

        // 渲染自定义地图
        function renderCustomMaps() {
            // 读取地图配置
            console.log('=== 开始读取地图配置 ===');
            const rawMapConfigs = localStorage.getItem('MAP_CONFIGS');
            console.log('localStorage中的原始数据:', rawMapConfigs ? rawMapConfigs.substring(0, 200) + '...' : 'null');
            
            const mapConfigs = JSON.parse(rawMapConfigs || '[]');
            const animalPool = JSON.parse(localStorage.getItem('ANIMAL_POOL') || '[]');
            
            const container = document.getElementById('custom-maps-grid');
            const section = document.getElementById('custom-maps-section');
            const countDisplay = document.getElementById('custom-map-count');
            
            console.log('=== 地图配置调试 ===');
            console.log('总地图配置数量:', mapConfigs.length);
            console.log('地图配置详情:', mapConfigs);
            console.log('动物池数量:', animalPool.length);
            
            // 更新计数
            countDisplay.textContent = mapConfigs.length;
            
            if (mapConfigs.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 col-span-3 py-8">
                        <p class="mb-2">暂无自定义地图</p>
                        <p class="text-sm">在地图配置器中创建地图后会显示在这里</p>
                    </div>
                `;
                return;
            }
            
            // 只显示顶层地图（没有父地图的）
            const topLevelMaps = mapConfigs.filter(map => !isSubmapOfAny(map.key, mapConfigs));
            
            console.log('顶层地图数量:', topLevelMaps.length);
            console.log('顶层地图:', topLevelMaps);
            
            if (topLevelMaps.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 col-span-3 py-8">
                        <p class="mb-2">暂无顶层地图</p>
                        <p class="text-sm">所有地图都是其他地图的子地图</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = topLevelMaps.map(map => {
                const animalCount = map.animals?.length || 0;
                const submapCount = map.submaps?.length || 0;
                
                // 获取地图中的动物信息
                const animalNames = getMapAnimalNames(map, animalPool);
                
                return `
                    <a href="world_instance.html?mapKey=${map.key}"
                       class="world-card h-80 rounded-xl overflow-hidden relative flex flex-col justify-end bg-gradient-to-br from-gray-800 to-gray-900 border-2 border-gray-700 hover:border-yellow-400">
                        <div class="overlay absolute inset-0"></div>
                        <div class="p-6 relative">
                            <div class="text-6xl mb-3">${map.icon}</div>
                            <h2 class="text-3xl font-bold text-white mb-2">${map.name}</h2>
                            <div class="space-y-1 text-sm">
                                <p class="text-orange-300 font-semibold">📊 等级: Lv.${map.level}</p>
                                <p class="text-blue-300">⏱️ 刷新: ${map.spawnInterval}秒</p>
                                <p class="text-green-300">🦁 上限: ${map.maxAnimals}只</p>
                                ${submapCount > 0 ? `<p class="text-purple-300">🗺️ 子地图: ${submapCount}个</p>` : ''}
                                ${animalCount > 0 ? `<p class="text-yellow-300">🎲 动物: ${animalCount}种</p>` : ''}
                            </div>
                            ${animalNames.length > 0 ? `
                                <div class="mt-2 text-xs text-gray-400">
                                    ${animalNames.slice(0, 3).join(' · ')}${animalNames.length > 3 ? '...' : ''}
                                </div>
                            ` : ''}
                        </div>
                    </a>
                `;
            }).join('');
        }

        // 检查地图是否是其他地图的子地图
        function isSubmapOfAny(mapKey, allMaps) {
            return allMaps.some(map =>
                map.submaps && map.submaps.some(sub => sub.mapKey === mapKey)
            );
        }

        // 获取地图中的动物名称
        function getMapAnimalNames(map, pool) {
            if (!map.animals || map.animals.length === 0) return [];
            
            return map.animals.map(config => {
                const animal = pool.find(a => a.key === config.animalKey);
                return animal ? animal.name : null;
            }).filter(name => name !== null);
        }
    </script>
</body>
</html>
